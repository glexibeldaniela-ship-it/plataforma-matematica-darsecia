<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Registro Estudiante</title>

  <!-- CORREGIDO: Ruta CSS (/Index está en html/, CSS en css/) -->
  <link rel="stylesheet" href="../css/estilo.css">
  <!-- CORREGIDO: MailJS igual corporativo, lo borras para now que no usas EmailJS -->

  <!-- CORREGIDO: Supabase supabase.js (en carpeta js/) -->
  <!-- import { supabase } from "../js/supabase.js"; -->

  <style>
    html, body {
      height: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    .contenedor-registro {
      animation: aparecer 0.7s ease;
      padding: 15px !important;
      margin-top: 10px;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .contenedor-registro input,
    .contenedor-registro select {
      margin-bottom: 8px;
      padding: 10px !important;
      height: 45px;
      box-sizing: border-box;
    }

    .fila-verificacion {
      display: flex;
      gap: 5px;
      margin-bottom: 10px;
    }

    .btn-enviar-codigo {
      background: #00838f;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 12px;
      font-size: 0.85rem;
      font-weight: bold;
      cursor: pointer;
      height: 45px;
    }

    .estado-codigo {
      font-size: 0.8rem;
      margin-bottom: 10px;
      text-align: center;
    }

    .estado-codigo.ok     { color: #2e7d32; font-weight: bold; }
    .estado-codigo.error  { color: #c62828; font-weight: bold; }
    .estado-codigo.espera { color: #e65100; }

    .badge-validado {
      display: none;
      color: #2e7d32;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
    }

    .paso-formulario {
      display: none;
    }
    .paso-activo {
      display: block;
    }

    .btn-navegacion {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 5px;
    }
  </style>
</head>

<body class="pantalla-registro">

  <div class="contenedor-registro">
    <h2 style="margin-top: 0; margin-bottom: 5px; font-size: 1.5rem;">🎓 Registro de Estudiante</h2>
    <div class="emoji-mate" style="margin-bottom: 10px;">📏✏️</div>

    <form id="formRegistro">

      <!-- PASO 1: Datos personales -->
      <div id="divPaso1" class="paso-formulario paso-activo">
        <input type="text" id="cedula" placeholder="Cédula" required>
        <input type="text" id="nombres" placeholder="Nombres completos" required>
        <input type="text" id="apellidos" placeholder="Apellidos completos" required>
        <label style="font-size: 0.8rem; display: block; margin-bottom: 4px;">Fecha de Nacimiento:</label>
        <input type="date" id="fechaNacimiento" required>

        <button type="button" class="btn-navegacion" style="background: #00838f; color: white;" onclick="cambiarPaso(2)">Siguiente</button>
      </div>

      <!-- PASO 2: Correo, verificación y contraseña -->
      <div id="divPaso2" class="paso-formulario">
        <div class="fila-verificacion">
          <input type="email" id="email" placeholder="Correo" required style="flex:1; margin-bottom:0;">
          <button type="button" id="btnEnviarCodigo" class="btn-enviar-codigo" onclick="enviarCodigoVerificacion()">📧 Enviar Código de Verificación</button>
          <!-- Este código lo da Supabase Auth, no EmailJS -->

        </div>

        <input type="text" id="codigoInput" placeholder="Ingresa el código de 6 dígitos" maxlength="6">

        <button type="button" id="btnVerificar" 
                style="background: #ff9800; margin-bottom:10px; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; width: 100%;" 
                onclick="validarCodigo()">✅ Verificar Código</button>

        <div id="reenviarRow" style="font-size:0.8rem; text-align:center; margin-bottom:10px;"></div>
        <div id="estadoCodigo" class="estado-codigo"></div>
        <div id="badgeValidado" class="badge-validado">✅ Correo Verificado</div>

        <input type="password" id="password" placeholder="Contraseña (mínimo 8 caracteres)" required>

        <div style="display: flex; gap: 10px;">
          <button type="button" class="btn-navegacion" style="background: #ccc;" onclick="cambiarPaso(1)">Atrás</button>
          <button type="button" id="btnSiguientePaso3" class="btn-navegacion" style="background: #00838f; color: white;" onclick="cambiarPaso(3)">Siguiente</button>
        </div>
      </div>

      <!-- PASO 3: Año, sección, lapso -->
      <div id="divPaso3" class="paso-formulario">
        <select id="anio" required>
