<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Registro Estudiante - MateEduPro</title>
  <link rel="stylesheet" href="../css/estilo.css">

  <style>
    html, body {
      height: 100%;
      overflow-x: hidden;
      margin: 0;
      padding: 0;
    }

    .contenedor-registro {
      animation: aparecer 0.7s ease;
      padding: 15px !important;
      margin-top: 10px;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .contenedor-registro input,
    .contenedor-registro select {
      margin-bottom: 8px;
      padding: 10px !important;
      height: 45px;
      box-sizing: border-box;
      width: 100%;
    }

    .paso-formulario {
      display: none;
    }
    .paso-activo {
      display: block;
    }

    .btn-navegacion {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      margin-top: 5px;
      transition: 0.3s;
    }
    
    .btn-navegacion:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body class="pantalla-registro">

  <div class="contenedor-registro">
    <h2 style="margin-top: 0; margin-bottom: 5px; font-size: 1.5rem;">🎓 Registro de Estudiante</h2>
    <div class="emoji-mate" style="margin-bottom: 10px;">📏✏️</div>

    <form id="formRegistro">

      <div id="divPaso1" class="paso-formulario paso-activo">
        <input type="text" id="cedula" placeholder="Cédula" required>
        <input type="text" id="nombres" placeholder="Nombres completos" required>
        <input type="text" id="apellidos" placeholder="Apellidos completos" required>
        <label style="font-size: 0.8rem; display: block; margin-bottom: 4px;">Fecha de Nacimiento:</label>
        <input type="date" id="fechaNacimiento" required>

        <button type="button" class="btn-navegacion" style="background: #00838f; color: white;"
                onclick="cambiarPaso(2)">Siguiente →</button>
      </div>

      <div id="divPaso2" class="paso-formulario">
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña (mínimo 8 caracteres)" required>

        <div style="display: flex; gap: 10px;">
          <button type="button" class="btn-navegacion" style="background: #ccc; color: #333;"
                  onclick="cambiarPaso(1)">← Atrás</button>
          <button type="button" class="btn-navegacion" style="background: #00838f; color: white;"
                  onclick="cambiarPaso(3)">Siguiente →</button>
        </div>
      </div>

      <div id="divPaso3" class="paso-formulario">
        <select id="anio" required>
          <option value="">-- Selecciona Año --</option>
          <option value="1er Año">1er Año</option>
          <option value="2do Año">2do Año</option>
          <option value="3er Año">3er Año</option>
          <option value="4to Año">4to Año</option>
          <option value="5to Año">5to Año</option>
        </select>

        <select id="seccion" required>
          <option value="">-- Selecciona Sección --</option>
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
          <option value="D">D</option>
          <option value="E">E</option>
        </select>

        <select id="lapso" required>
          <option value="">-- Selecciona Lapso --</option>
          <option value="1er Lapso">1er Lapso</option>
          <option value="2do Lapso">2do Lapso</option>
          <option value="3er Lapso">3er Lapso</option>
        </select>

        <div style="display: flex; gap: 10px;">
          <button type="button" class="btn-navegacion" style="background: #ccc; color: #333;"
                  onclick="cambiarPaso(2)">← Atrás</button>
          <button type="submit" class="btn-navegacion" style="background: #2e7d32; color: white;">
            ✅ Registrarse
          </button>
        </div>
      </div>

    </form>
  </div>

  <script type="module">
    import '../js/registro.js';

    window.cambiarPaso = function (numeroPaso) {
      const pasoActual = document.querySelector('.paso-activo');
      if (!pasoActual) return;
      
      const numActual = parseInt(pasoActual.id.replace('divPaso', ''));

      // Validaciones antes de avanzar
      if (numeroPaso > numActual) {
        if (numActual === 1) {
          const cedula    = document.getElementById('cedula').value.trim();
          const nombres   = document.getElementById('nombres').value.trim();
          const apellidos = document.getElementById('apellidos').value.trim();
          const fechaNac  = document.getElementById('fechaNacimiento').value;
          if (!cedula || !nombres || !apellidos || !fechaNac) {
            alert('Por favor completa tus datos personales antes de continuar.');
            return;
          }
        }

        if (numActual === 2) {
          const emailVal = document.getElementById('email').value.trim();
          const pass     = document.getElementById('password').value.trim();
          if (!emailVal || !pass) {
            alert('Debes ingresar un correo y una contraseña.');
            return;
          }
          if (pass.length < 8) {
            alert('La contraseña debe tener al menos 8 caracteres.');
            return;
          }
        }
      }

      // Cambio visual de pasos
      document.querySelectorAll('.paso-formulario').forEach(function (div) {
        div.classList.remove('paso-activo');
      });
      const destino = document.getElementById('divPaso' + numeroPaso);
      if (destino) destino.classList.add('paso-activo');
    };
  </script>
