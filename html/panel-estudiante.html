<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Estudiante - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="../css/estilo.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
    .header { background: linear-gradient(135deg, #00796b, #004d40); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .contenedor { padding: 20px; max-width: 800px; margin: 0 auto; }
    .perfil-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border-left: 5px solid #ff9800; display: flex; align-items: center; gap: 15px; }
    .perfil-card i { font-size: 2rem; color: #00796b; }
    .seccion-titulo { color: #00796b; border-bottom: 2px solid #00bcd4; padding-bottom: 5px; margin: 20px 0; font-weight: bold; display: flex; align-items: center; gap: 8px; }
    .examen-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #00bcd4; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th { background: #00796b; color: white; padding: 12px; text-align: left; font-size: 0.9rem; }
    td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    .btn-pdf-examen { background: #e53935; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 12px; display: flex; align-items: center; gap: 5px; }
    .btn-iniciar { background: #00796b; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    .btn-ver { background: #0288d1; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 5px; font-size: 12px; display: flex; align-items: center; gap: 5px; }

    #modalRepaso {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0, 0, 0, 0.85);
        z-index: 10000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 15px;
    }
    #modalRepaso.activo { display: flex; }
    .modal-caja {
        background: white;
        border-radius: 15px;
        width: 100%;
        max-width: 850px;
        height: 90vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }
    .modal-header { background: #00796b; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    #iframeRepaso { flex: 1; border: none; width: 100%; }
    .modal-footer { padding: 15px; background: #f4f4f4; border-top: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
    #btnComenzarExamen { background: #00796b; color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; display: none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h2 style="margin:0"><i class="fas fa-calculator"></i> MateEduPro 🎓</h2>
    <small>Panel Estudiante</small>
  </div>
  <button id="btnSalir" style="background:rgba(255,255,255,0.2); border:1px solid white; color:white; padding:5px 12px; border-radius:10px; font-weight:bold; cursor:pointer;">
    <i class="fas fa-sign-out-alt"></i> Salir
  </button>
</div>

<div class="contenedor">
  <div id="datosPersonales" class="perfil-card">
      <i class="fas fa-user-circle"></i>
      <div><p>Cargando perfil...</p></div>
  </div>

  <div class="seccion-titulo"><i class="fas fa-file-alt"></i> Exámenes Disponibles</div>
  <div id="listaExamenes">Buscando evaluaciones...</div>

  <div class="seccion-titulo"><i class="fas fa-chart-line"></i> Tu Historial de Notas</div>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>Evaluación</th>
          <th>Nota</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="bodyHistorial">
          <tr><td colspan="3" style="text-align:center;">Cargando historial...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div id="modalRepaso">
  <div class="modal-caja">
    <div class="modal-header">
      <h3 style="margin:0"><i class="fas fa-book-reader"></i> Repaso Obligatorio</h3>
      <button onclick="cerrarRepaso()" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>
    <iframe id="iframeRepaso" src=""></iframe>
    <div class="modal-footer">
      <span id="cargandoMsj" style="color:#666;"><i class="fas fa-spinner fa-spin"></i> Cargando material educativo...</span>
      <button id="btnComenzarExamen" onclick="irAlExamen()">✅ Comenzar Evaluación</button>
      <button onclick="cerrarRepaso()" style="background:#ccc; border:none; padding:10px 15px; border-radius:8px; cursor:pointer;">Cancelar</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  window.n = supabase.createClient(
    'https://abejdltqyeuslgmmfucx.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFiZWpkbHRxeWV1c2xnbW1mdWN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkwMTIxNzIsImV4cCI6MjA4NDU4ODE3Mn0.7lT2M4ebC2r9oXIOhA3CfR5YKqg92q48n9UkkH93UuI'
  );
</script>

<script>
let datosUsuario = null;
let urlExamenPendiente = "";

async function inicializar() {
    try {
        const { data: { session }, error: sessionError } = await window.n.auth.getSession();
        if (sessionError || !session) { window.location.href = "login.html"; return; }

        const { data: user, error: userError } = await window.n.from('estudiantes').select('*').eq('id', session.user.id).single();
        if (userError) throw userError;

        if (user) {
            datosUsuario = user;
            document.getElementById("datosPersonales").innerHTML =
                "<i class='fas fa-user-graduate' style='font-size:2rem; color:#00796b;'></i>" +
                "<div><b>" + user.nombres_completos + " " + user.apellido_completo + "</b><br>" +
                "<span>C.I: " + (user.cedula || "N/P") + " | " + user.anio + " | Sección: " + user.seccion + "</span></div>";

            cargarExamenes(user.anio, user.seccion, session.user.id);
            cargarHistorial(session.user.id);
        }
    } catch (err) { 
        document.getElementById("datosPersonales").innerHTML = `<p style="color:red;">⚠️ Error: ${err.message}</p>`;
    }
}

async function cargarExamenes(anioEstudiante, seccionEstudiante, userId) {
    const lista = document.getElementById("listaExamenes");
    try {
        // Traemos TODOS los exámenes activos
        const { data: examenes, error: errEx } = await window.n.from('examenes').select('*').eq('activo', true);
        if (errEx) throw errEx;

        // Traemos lo que ya realizó
        const { data: realizados } = await window.n.from('resultados').select('examen_id').eq('estudiante_id', userId);
        const idsRealizados = (realizados || []).map(r => r.examen_id);

        lista.innerHTML = "";

        // FILTRO INTELIGENTE: Ignora mayúsculas/minúsculas y espacios
        const filtrados = (examenes || []).filter(ex => {
            const mismoAnio = ex.anio.trim().toLowerCase() === anioEstudiante.trim().toLowerCase();
            const mismaSeccion = ex.seccion === "Ambas" || ex.seccion.trim().toLowerCase() === seccionEstudiante.trim().toLowerCase();
            const noRealizado = !idsRealizados.includes(ex.id);
            return mismoAnio && mismaSeccion && noRealizado;
        });

        if (filtrados.length === 0) {
            lista.innerHTML = "<p style='text-align:center; color:#777;'><i class='fas fa-check-circle'></i> No hay exámenes para tu año/sección o ya los completaste.</p>";
            return;
        }

        filtrados.forEach(ex => {
            lista.innerHTML += `
                <div class='examen-card'>
                    <div><strong><i class='fas fa-book'></i> ${ex.titulo}</strong><br>
                    <small><i class='fas fa-clock'></i> Duración: ${ex.duracion} min</small></div>
                    <button class='btn-iniciar' onclick="gestionarInicio('${ex.id}', '${ex.url_repaso || ""}')"><i class='fas fa-play'></i> Iniciar</button>
                </div>`;
        });
    } catch (err) {
        lista.innerHTML = `<p style="color:red;">⚠️ Error: ${err.message}</p>`;
    }
}

function gestionarInicio(id, urlRepaso) {
    if (!urlRepaso || urlRepaso === "" || urlRepaso === "null") {
        window.location.href = "presentar-examen.html?id=" + id;
    } else {
        urlExamenPendiente = "presentar-examen.html?id=" + id;
        document.getElementById("iframeRepaso").src = urlRepaso;
        document.getElementById("modalRepaso").classList.add("activo");
        document.getElementById("btnComenzarExamen").style.display = "none";
        document.getElementById("cargandoMsj").style.display = "block";

        document.getElementById("iframeRepaso").onload = function() {
            document.getElementById("cargandoMsj").style.display = "none";
            document.getElementById("btnComenzarExamen").style.display = "block";
        };
    }
}

function cerrarRepaso() {
    document.getElementById("modalRepaso").classList.remove("activo");
    document.getElementById("iframeRepaso").src = "";
}

function irAlExamen() {
    window.location.href = urlExamenPendiente;
}

async function cargarHistorial(userId) {
    const body = document.getElementById("bodyHistorial");
    try {
        const { data: notas, error } = await window.n.from('resultados').select('*, examenes(titulo)').eq('estudiante_id', userId);
        if (error) throw error;

        body.innerHTML = "";
        if (!notas || notas.length === 0) {
            body.innerHTML = "<tr><td colspan='3' style='text-align:center;'>No hay notas registradas.</td></tr>";
            return;
        }

        notas.forEach(n => {
            body.innerHTML += `
                <tr>
                    <td>${n.examenes ? n.examenes.titulo : 'Examen'}</td>
                    <td><b style='color:#00796b'>${n.nota} / 20</b></td>
                    <td><div style='display:flex; gap:5px;'>
                        <button class='btn-pdf-examen' onclick="descargarReporte('${n.id}')"><i class='fas fa-file-pdf'></i> PDF</button>
                        <button class='btn-ver' onclick="window.location.href='resultados.html?id=${n.examen_id}'"><i class='fas fa-eye'></i> Ver</button>
                    </div></td>
                </tr>`;
        });
    } catch (err) {
        body.innerHTML = `<tr><td colspan="3" style="color:red; text-align:center;">⚠️ Error: ${err.message}</td></tr>`;
    }
}

async function descargarReporte(resultadoId) {
    try {
        const { data: res, error } = await window.n.from('resultados').select('*, examenes(*), estudiantes(*)')
            .eq('id', resultadoId).single();
        if (error || !res) throw error;

        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.setFont("helvetica", "bold").setFontSize(9);
        docPDF.text("REPUBLICA BOLIVARIANA DE VENEZUELA", 105, 12, { align: "center" });
        docPDF.text("U.E.E. CECILIA NUNEZ SUCRE", 105, 17, { align: "center" });
        docPDF.line(20, 20, 190, 20);
        docPDF.setFontSize(12).text("COMPROBANTE DE CALIFICACION", 105, 30, { align: "center" });
        docPDF.setFont("helvetica", "normal").setFontSize(10);
        docPDF.text("ESTUDIANTE: " + (res.estudiantes.nombres_completos || "") + " " + (res.estudiantes.apellido_completo || ""), 20, 45);
        docPDF.text("CEDULA: " + (res.estudiantes.cedula || "N/P"), 20, 52);
        docPDF.text("EVALUACION: " + res.examenes.titulo, 20, 59);
        docPDF.text("NOTA: " + res.nota + " / 20 Puntos", 20, 66);
        docPDF.line(70, 100, 140, 100);
        docPDF.setFont("helvetica", "bold").text("JOSE AGUSTIN FERNANDEZ", 105, 105, { align: "center" });
        docPDF.text("PROFESOR DE MATEMATICAS", 105, 110, { align: "center" });
        docPDF.save("Nota_" + res.examenes.titulo.replace(/\s/g, '_') + ".pdf");
    } catch (err) {
        alert("No se pudo generar el PDF: " + err.message);
    }
}

document.getElementById("btnSalir").onclick = async function() {
    await window.n.auth.signOut();
    window.location.href = "login.html";
};

inicializar();
</script>
</body>
</html>
