<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Panel Profesor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Usar tu mismo diseño -->
<link rel="stylesheet" href="estilos.css">

<style>

/* fondo suave para panel */
body{
background:#f0f4f8;
padding:15px;
}

/* contenedor principal estilo app */
.panel-box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
max-width:1000px;
margin:auto;
animation: aparecer 0.5s ease;
}

/* animación suave */
@keyframes aparecer{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="panel-box">

<h2>Panel del Profesor</h2>

<button id="btnCrear" class="btn-turquesa">➕ Crear Examen</button>

<hr>

<h3>Lista de Exámenes</h3>

<table id="tablaExamenes">

<thead>
<tr>
<th>Título</th>
<th>Año</th>
<th>Sección</th>
<th>Lapso</th>
<th>Estado</th>
<th>Acciones</th>
</tr>
</thead>

<tbody></tbody>

</table>

<hr>

<h3>Resultados</h3>

<select id="selectExamen">
<option value="">Selecciona un examen</option>
</select>

<select id="filtroAnio">
<option value="">Filtrar por Año</option>
</select>

<select id="filtroSeccion">
<option value="">Filtrar por Sección</option>
</select>

<button id="btnPDF" class="btn-turquesa">📄 Descargar Acta General</button>
<button id="btnPDFEstudiantes" class="btn-turquesa">📄 Descargar Lista Estudiantes</button>

<hr>

<table id="tablaResultados">

<thead>
<tr>
<th>Nombre</th>
<th>Grado</th>
<th>Sección</th>
<th>Lapso</th>
<th>Tiempo</th>
<th>Nota</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="resumen" id="resumenBox" style="display:none;">

<strong>Total Estudiantes:</strong> <span id="totalEst"></span> |
<strong>Promedio:</strong> <span id="promedio"></span> |
🟢 <strong>Aprobados:</strong> <span id="aprobados"></span> |
🔴 <strong>Reprobados:</strong> <span id="reprobados"></span>

</div>

<h3>Estudiantes en Línea</h3>

<div class="onlineList" id="onlineEstudiantes"></div>

</div>
