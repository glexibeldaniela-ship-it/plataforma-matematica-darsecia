<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crear Examen</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>Crear Examen</h2>

<input type="text" id="titulo" placeholder="Título del examen"><br><br>

<input type="text" id="anio" placeholder="Año (Ej: 3er año)"><br><br>
<input type="text" id="seccion" placeholder="Sección (Ej: A)"><br><br>
<input type="text" id="lapso" placeholder="Lapso (1,2,3)"><br><br>

<input type="number" id="duracion" placeholder="Duración en minutos"><br><br>

<input type="text" id="repaso" placeholder="Link Google Drive (repaso obligatorio)"><br><br>

<button id="btnGuardar">Guardar Examen</button>

<br><br>
<button onclick="volver()">Volver</button>

<script type="module" src="crear-examen.js"></script>

</body>
</html>
