<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Crear Examen - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="estilos.css">

<style>
/* Estilo Profesional Sugerido por el Conejito */
body {
  margin: 0; padding: 15px;
  background: #f0f4f8;
  font-family: 'Segoe UI', sans-serif;
}

.header {
  background: linear-gradient(135deg, #00796b, #004d40);
  color: white; padding: 20px;
  border-radius: 15px; text-align: center;
  margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.contenedor {
  background: white; padding: 20px;
  border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  max-width: 700px; margin: 0 auto;
}

/* Inputs Modernos */
.campo-grupo { margin-bottom: 15px; }
label { display: block; font-weight: bold; color: #00796b; margin-bottom: 5px; font-size: 0.9rem; }
input, select {
  width: 100%; padding: 12px;
  border-radius: 10px; border: 1px solid #ddd;
  box-sizing: border-box; font-size: 16px; /* Evita zoom en iPhone */
}

/* Tarjeta de Pregunta */
.pregunta-card {
  background: #f9f9f9; padding: 15px;
  border-radius: 12px; border-left: 5px solid #00bcd4;
  margin-bottom: 20px; position: relative;
}

.btn-eliminar {
  background: #ff5252; color: white; border: none;
  padding: 5px 10px; border-radius: 8px;
  position: absolute; top: 10px; right: 10px; cursor: pointer;
}

.btn-accion {
  width: 100%; padding: 15px;
  border-radius: 12px; border: none;
  font-weight: bold; cursor: pointer;
  margin-bottom: 10px; transition: 0.3s;
}

.btn-guardar { background: #00bcd4; color: white; }
.btn-agregar { background: #00796b; color: white; }
.btn-volver { background: #90a4ae; color: white; }

@media(max-width: 600px) {
  .contenedor { padding: 15px; }
}
</style>
</head>
<body>

<div class="header">
  <h2 style="margin:0;">📝 Nuevo Examen</h2>
  <small>Configuración para la U.E.E. Cecilia Núñez Sucre</small>
</div>

<div class="contenedor">

  <div class="campo-grupo">
    <label>Título del Examen</label>
    <input type="text" id="titulo" placeholder="Ej: Polinomios Parte 1">
  </div>

  <div style="display: flex; gap: 10px;">
    <div class="campo-grupo" style="flex:1;">
      <label>Año</label>
      <select id="anio">
        <option value="1">1er Año</option>
        <option value="2">2do Año</option>
        <option value="3">3er Año</option>
      </select>
    </div>
    <div class="campo-grupo" style="flex:1;">
      <label>Sección</label>
      <input type="text" id="seccion" placeholder="A, B, C...">
    </div>
  </div>

  <div style="display: flex; gap: 10px;">
    <div class="campo-grupo" style="flex:1;">
      <label>Lapso</label>
      <select id="lapso">
        <option value="1">1er Lapso</option>
        <option value="2">2do Lapso</option>
        <option value="3">3er Lapso</option>
      </select>
    </div>
    <div class="campo-grupo" style="flex:1;">
      <label>Duración (Min)</label>
      <input type="number" id="duracion" placeholder="Ej: 45">
    </div>
  </div>

  <div class="campo-grupo">
    <label>Link de Repaso (Google Drive)</label>
    <input type="text" id="repaso" placeholder="https://drive.google.com/...">
    <small style="color: #666;">El alumno deberá verlo por 2 minutos obligatorios.</small>
  </div>

  <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

  <h3 style="color: #00796b;">Preguntas</h3>
  <div id="contenedorPreguntas"></div>

  <button class="btn-accion btn-agregar" id="btnAgregar">➕ Agregar Pregunta</button>
  <button class="btn-accion btn-guardar" id="btnGuardar">💾 Guardar y Publicar</button>
  <button class="btn-accion btn-volver" onclick="location.href='panel-profesor.html'">⬅️ Cancelar</button>

</div>

<script type="module" src="crear-examen.js"></script>

</body>
</html>
