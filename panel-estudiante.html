<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Estudiante - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="estilos.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
<style>
    body { font-family: sans-serif; background: #f4f7f6; }
    .header { background: linear-gradient(135deg, #00796b, #004d40); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 15px 15px; }
    .contenedor { padding: 20px; max-width: 800px; margin: 0 auto; }
    .perfil-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .seccion-titulo { color: #00796b; border-bottom: 2px solid #00bcd4; padding-bottom: 5px; margin: 20px 0; font-weight: bold; }
    .examen-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #00bcd4; display: flex; justify-content: space-between; align-items: center; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th { background: #00796b; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .btn-pdf-examen { background: #00796b; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h2 style="margin:0">MateEduPro 🎓</h2>
    <small>Panel Estudiante</small>
  </div>
  <button onclick="cerrarSesion()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:8px;">Salir</button>
</div>

<div class="contenedor">
  <div id="datosPersonales" class="perfil-card"><p>Cargando perfil...</p></div>

  <div class="seccion-titulo">📋 Exámenes Disponibles</div>
  <div id="listaExamenes"></div>

  <div class="seccion-titulo">📊 Tu Historial de Notas</div>
  <div style="overflow-x:auto;">
    <table>
      <thead>
        <tr>
          <th>Evaluación</th>
          <th>Nota</th>
          <th>Reporte</th>
        </tr>
      </thead>
      <tbody id="bodyHistorial"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let datosUsuario = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  try {
    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
    if (userSnap.exists()) {
      datosUsuario = userSnap.data();
      document.getElementById("datosPersonales").innerHTML = "<b>" + datosUsuario.nombres + " " + datosUsuario.apellidos + "</b><br>C.I: " + (datosUsuario.cedula || "N/P") + " | " + datosUsuario.anio + "° Año Secc: " + datosUsuario.seccion;
      cargarExamenes(datosUsuario.anio, datosUsuario.seccion);
      cargarHistorial(user.uid, datosUsuario.anio, datosUsuario.seccion);
    }
  } catch (error) {
    console.error("Error al cargar perfil:", error);
  }
});

async function cargarExamenes(anio, sec) {
  const lista = document.getElementById("listaExamenes");
  try {
    // CORRECCIÓN: Filtro optimizado para mostrar exámenes según año y sección
    const q = query(collection(db, "examenes"), where("activo", "==", true), where("anio", "==", anio));
    const snap = await getDocs(q);
    
    lista.innerHTML = snap.empty ? "<p>No hay exámenes activos para tu grado.</p>" : "";
    
    snap.forEach(d => {
      const ex = d.data();
      // Validamos sección (específica o 'Ambas')
      if (ex.seccion === sec || ex.seccion === "Ambas") {
        lista.innerHTML += "<div class='examen-card'><div><strong>" + ex.titulo + "</strong><br><small>Duración: " + ex.duracion + " min</small></div><button onclick=\"window.location.href='presentar-examen.html?id=" + d.id + "'\" style='background:#00796b; color:white; border:none; padding:8px 15px; border-radius:5px;'>Iniciar</button></div>";
      }
    });
  } catch (error) {
    lista.innerHTML = "Error al cargar exámenes.";
  }
}

async function cargarHistorial(uid, anio, sec) {
  const body = document.getElementById("bodyHistorial");
  body.innerHTML = "<tr><td colspan='3'>Cargando historial...</td></tr>";
  
  try {
    const qEx = query(collection(db, "examenes"), where("anio", "==", anio));
    const snapEx = await getDocs(qEx);
    body.innerHTML = "";

    for (const docEx of snapEx.docs) {
        const exData = docEx.data();
        if (exData.seccion === sec || exData.seccion === "Ambas") {
            // CORRECCIÓN #2: Buscar resultados específicos de este estudiante
            const resSnap = await getDocs(collection(db, "examenes", docEx.id, "resultados"));
            resSnap.forEach(resDoc => {
                const res = resDoc.data();
                if (res.estudiante_id === uid || res.cedula === datosUsuario.cedula) {
                    const tr = document.createElement("tr");
                    tr.innerHTML = "<td>" + exData.titulo + "</td><td><b style='color:#00796b'>" + res.nota + "/20</b></td><td><button class='btn-pdf-examen' id='btnPdf_" + resDoc.id + "'>📥 PDF</button></td>";
                    body.appendChild(tr);
                    
                    document.getElementById("btnPdf_" + resDoc.id).onclick = () => window.descargarExamenPDF(docEx.id, exData.titulo, res.nota);
                }
            });
        }
    }
    if (body.innerHTML === "") body.innerHTML = "<tr><td colspan='3'>Aún no tienes exámenes realizados.</td></tr>";
  } catch (error) {
    body.innerHTML = "<tr><td colspan='3'>Error al cargar historial.</td></tr>";
  }
}

function triggerDownload(docPDF, fileName) {
    const nombreFinal = fileName.toLowerCase().endsWith('.pdf') ? fileName : fileName + '.pdf';
    try {
        docPDF.save(nombreFinal);
    } catch (e) {
        const dataUri = docPDF.output('datauristring');
        const link = document.createElement('a');
        link.href = dataUri;
        link.download = nombreFinal;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}

window.descargarExamenPDF = async (exId, titulo, nota) => {
  try {
    const pregSnap = await getDocs(collection(db, "examenes", exId, "preguntas"));
    const { jsPDF } = window.jspdf;
    const docPDF = new jsPDF();
    
    // Encabezado del Acta
    docPDF.setFontSize(14);
    docPDF.text("MATEEDUPRO - REPORTE DE EVALUACIÓN", 105, 15, { align: "center" });
    docPDF.setFontSize(10);
    docPDF.text("U.E.E. CECILIA NÚÑEZ SUCRE", 105, 22, { align: "center" });
    
    docPDF.line(20, 25, 190, 25);
    
    docPDF.text("ESTUDIANTE: " + datosUsuario.nombres + " " + datosUsuario.apellidos, 20, 35);
    docPDF.text("CÉDULA: " + (datosUsuario.cedula || "N/P"), 20, 42);
    docPDF.text("EXAMEN: " + titulo, 20, 49);
    docPDF.setFontSize(12);
    docPDF.text("CALIFICACIÓN FINAL: " + nota + " / 20", 20, 58);
    
    docPDF.setFontSize(10);
    docPDF.text("CONTENIDO EVALUADO:", 20, 70);
    
    let y = 80;
    let cont = 1;
    pregSnap.forEach((p) => {
        if (y > 270) { docPDF.addPage(); y = 20; }
        const datosPreg = p.data();
        docPDF.text(cont + ". " + datosPreg.enunciado, 25, y);
        y += 10;
        cont++;
    });

    triggerDownload(docPDF, "Resultado_" + titulo);
  } catch (error) {
    alert("No se pudo generar el PDF. Intente de nuevo.");
  }
};

window.cerrarSesion = () => signOut(auth).then(() => window.location.href = "login.html");
</script>
</body>
</html>
