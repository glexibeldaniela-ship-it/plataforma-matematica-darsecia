<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Estudiante - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="estilos.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
    .header { background: linear-gradient(135deg, #00796b, #004d40); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 15px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .contenedor { padding: 20px; max-width: 800px; margin: 0 auto; }
    .perfil-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; border-left: 5px solid #ff9800; }
    .seccion-titulo { color: #00796b; border-bottom: 2px solid #00bcd4; padding-bottom: 5px; margin: 20px 0; font-weight: bold; display: flex; align-items: center; gap: 8px; }
    .examen-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #00bcd4; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th { background: #00796b; color: white; padding: 12px; text-align: left; font-size: 0.9rem; }
    td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    .btn-pdf-examen { background: #00796b; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-pdf-examen:hover { background: #004d40; }
    .btn-iniciar { background: #00796b; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h2 style="margin:0">MateEduPro 🎓</h2>
    <small>Panel Estudiante</small>
  </div>
  <button onclick="window.cerrarSesion()" style="background:rgba(255,255,255,0.2); border:1px solid white; color:white; padding:5px 12px; border-radius:10px; font-weight:bold;">Salir</button>
</div>

<div class="contenedor">
  <div id="datosPersonales" class="perfil-card">
      <p>Cargando perfil del estudiante...</p>
  </div>

  <div class="seccion-titulo">📋 Exámenes Disponibles</div>
  <div id="listaExamenes"></div>

  <div class="seccion-titulo">📊 Tu Historial de Notas</div>
  <div style="overflow-x:auto;" class="tabla-scroll">
    <table>
      <thead>
        <tr>
          <th>Evaluación</th>
          <th>Nota</th>
          <th>Reporte</th>
        </tr>
      </thead>
      <tbody id="bodyHistorial"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let datosUsuario = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  try {
    const userSnap = await getDoc(doc(db, "usuarios", user.uid));
    if (userSnap.exists()) {
      datosUsuario = userSnap.data();
      document.getElementById("datosPersonales").innerHTML = 
        "<b>" + datosUsuario.nombres + " " + datosUsuario.apellidos + "</b><br>" +
        "C.I: " + (datosUsuario.cedula || "N/P") + 
        " | " + datosUsuario.anio + "° Año  Secc: " + datosUsuario.seccion;

      window.cargarExamenes(datosUsuario.anio, datosUsuario.seccion);
      window.cargarHistorial(user.uid, datosUsuario.anio, datosUsuario.seccion);
    }
  } catch (error) {
    console.error("Error al cargar perfil:", error);
  }
});

window.cargarExamenes = async (anio, sec) => {
  const lista = document.getElementById("listaExamenes");
  try {
    const qEx = query(
      collection(db, "examenes"), 
      where("activo", "==", true), 
      where("anio", "==", anio)
    );
    const snap = await getDocs(qEx);

    lista.innerHTML = snap.empty 
      ? "<p style='text-align:center; color:#777; padding:20px;'>No hay exámenes activos por ahora.</p>" 
      : "";

    snap.forEach(d => {
      const ex = d.data();
      if (ex.seccion === sec || ex.seccion === "Ambas") {
        lista.innerHTML += 
          "<div class='examen-card'>" +
            "<div><strong>" + ex.titulo + "</strong><br>" +
            "<small>Tiempo: " + ex.duracion + " minutos</small></div>" +
            "<button class='btn-iniciar' onclick=\"window.location.href='presentar-examen.html?id=" + d.id + "'\">Iniciar</button>" +
          "</div>";
      }
    });
  } catch (error) {
    lista.innerHTML = "<p>Error al cargar la lista.</p>";
    console.error("cargarExamenes:", error);
  }
};

  const body = document.getElementById("bodyHistorial");
  body.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Buscando tus notas...</td></tr>";

  try {

      const exData = docEx.data();
      if (exData.seccion !== sec && exData.seccion !== "Ambas") { continue; }

      try {

        if (!resSnap.exists()) { continue; }

        const res = resSnap.data();
        hayNotas = true;

        const btnId = "btnPdf_" + docEx.id;
        const btnVerDetalle = "btnDetalle_" + docEx.id;
        const tr = document.createElement("tr");
        tr.innerHTML = 
          "<td>" + exData.titulo + "</td>" +
          "<td><b style='color:#00796b'>" + res.nota + " / 20</b></td>" +
          "<td>" +
            "<button class='btn-pdf-examen' id='" + btnId + "' style='margin-right:5px;'>📥 PDF</button>" +

      } catch (errRes) {

      }
    }

    if (!hayNotas) {
      body.innerHTML = "<tr><td colspan='3' style='text-align:center;'>Aún no tienes notas registradas.</td></tr>";
    }
  } catch (error) {
    body.innerHTML = "<tr><td colspan='3'>Error al cargar historial.</td></tr>";
    console.error("cargarHistorial:", error);
  }
};

// --- FUNCIÓN DE PDF ACTUALIZADA CON MEMBRETE Y FIRMA ---
window.descargarExamenPDF = async (exId, titulo, datRes, exDataParam) => {
  try {
    // CORRECCIÓN C: usar exDataParam si ya viene disponible; solo hacer getDoc si no
    let exData = exDataParam || null;
    if (!exData) {
      const exSnap = await getDoc(doc(db, "examenes", exId));
      if (!exSnap.exists()) { alert("No se encontró el examen."); return; }
      exData = exSnap.data();
    }

    const { jsPDF } = window.jspdf;
    const docPDF = new jsPDF();

    // 1. MEMBRETE INSTITUCIONAL
    docPDF.setFont("helvetica", "bold");
    docPDF.setFontSize(9);
    docPDF.text("REPÚBLICA BOLIVARIANA DE VENEZUELA", 105, 12, { align: "center" });
    docPDF.text("MINISTERIO DEL PODER POPULAR PARA LA EDUCACIÓN", 105, 17, { align: "center" });
    docPDF.text("MUNICIPIO MARA - PARROQUIA LA SIERRITA - ESTADO ZULIA", 105, 22, { align: "center" });
    docPDF.text("UNIDAD EDUCATIVA ESTATAL CECILIA NÚÑEZ SUCRE", 105, 27, { align: "center" });
    docPDF.setLineWidth(0.5);
    docPDF.line(20, 30, 190, 30);

    // Título del reporte
    docPDF.setFontSize(13);
    docPDF.text("COMPROBANTE DE EVALUACIÓN DIGITAL", 105, 40, { align: "center" });

    // 2. DATOS DEL ESTUDIANTE
    docPDF.setFontSize(10);
    docPDF.setFont("helvetica", "normal");
    docPDF.text("ESTUDIANTE: " + (datosUsuario.nombres || "").toUpperCase() + " " + (datosUsuario.apellidos || "").toUpperCase(), 25, 50);
    docPDF.text("CÉDULA: " + (datosUsuario.cedula || "N/P"), 25, 56);
    docPDF.text("EVALUACIÓN: " + titulo.toUpperCase(), 25, 62);

    docPDF.setFont("helvetica", "bold");
    docPDF.setTextColor(0, 121, 107);
    docPDF.text("CALIFICACIÓN FINAL: " + (datRes.nota || "0") + " / 20 Pts.", 25, 70);
    docPDF.setTextColor(0, 0, 0);

    let y = 80;
    const detalle = Array.isArray(datRes.respuestas_detalle) ? datRes.respuestas_detalle : [];

    if (detalle.length > 0) {
      docPDF.setFont("helvetica", "bold");
      docPDF.text("DETALLE DE RESPUESTAS:", 25, y); y += 8;
      detalle.forEach(function(item, idx) {
        if (y > 250) { docPDF.addPage(); y = 25; }

        // CORRECCIÓN D: comparación exacta, no .includes() (evita falso positivo con "Incorrecta")
        const esOk = typeof item.resultado === "string"
          && item.resultado.toLowerCase() === "correcta";
        const icono = esOk ? "[CORRECTO] " : "[INCORRECTO] ";

        const lineas = docPDF.splitTextToSize(
          (idx + 1) + ". " + (item.enunciado || ""), 160
        );

        docPDF.setFont("helvetica", "bold");
        docPDF.setFontSize(9);
        docPDF.text(lineas, 25, y); y += (lineas.length * 5);

        docPDF.setFont("helvetica", "normal");
        docPDF.text(icono + "Respuesta: " + (item.respuesta_estudiante || "Sin respuesta"), 30, y);
        y += 7;
      });
    } else {
      const preguntas = Array.isArray(exData.preguntas) ? exData.preguntas : [];
      docPDF.setFont("helvetica", "normal");
      docPDF.text("CONTENIDO EVALUADO:", 25, y); y += 8;
      preguntas.forEach(function(preg, idx) {
        if (y > 250) { docPDF.addPage(); y = 25; }
        const texto = preg.enunciado || preg.texto || ("Pregunta " + (idx + 1));
        const lineas = docPDF.splitTextToSize((idx + 1) + ". " + texto, 160);
        docPDF.text(lineas, 25, y); y += (lineas.length * 5) + 3;
      });
    }

    // 3. BLOQUE DE FIRMA OFICIAL
    if (y > 240) { docPDF.addPage(); y = 30; } else { y += 20; }

    docPDF.setLineWidth(0.4);
    docPDF.line(70, y, 140, y);
    y += 5;
    docPDF.setFont("helvetica", "bold");
    docPDF.setFontSize(10);
    docPDF.text("JOSÉ FERNÁNDEZ", 105, y, { align: "center" });
    y += 5;
    docPDF.setFont("helvetica", "normal");
    docPDF.setFontSize(9);
    docPDF.text("C.I: 28.123.219", 105, y, { align: "center" });
    y += 5;
    docPDF.text("PROFESOR DEL ÁREA DE MATEMÁTICAS", 105, y, { align: "center" });

    const nomArchivo = "Nota_" + titulo.replace(/\s/g, "_") + ".pdf";
    docPDF.save(nomArchivo);

  } catch (error) {
    alert("No se pudo generar el PDF con el formato oficial.");
    console.error("descargarExamenPDF:", error);
  }
};

window.cerrarSesion = () => signOut(auth).then(() => window.location.href = "login.html");
</script>
</body>
</html>
