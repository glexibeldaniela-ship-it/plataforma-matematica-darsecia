<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel Estudiante - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="estilos.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
<style>
    body { font-family: sans-serif; background: #f4f7f6; }
    .header { background: linear-gradient(135deg, #00bcd4, #00796b); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 0 0 15px 15px; }
    .contenedor { padding: 20px; max-width: 800px; margin: 0 auto; }
    .perfil-card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
    .seccion-titulo { color: #00796b; border-bottom: 2px solid #00bcd4; padding-bottom: 5px; margin: 20px 0; font-weight: bold; }
    .examen-card { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; border-left: 5px solid #00bcd4; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
    th { background: #00796b; color: white; padding: 10px; text-align: left; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .btn-pdf-examen { background: #00796b; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
</style>
</head>
<body>
<div class="header">
  <h2>MateEduPro 🎓</h2>
  <button onclick="cerrarSesion()" style="background:none; border:1px solid white; color:white; padding:5px 10px; border-radius:8px;">Salir</button>
</div>

<div class="contenedor">
  <div id="datosPersonales" class="perfil-card"><p>Cargando perfil...</p></div>

  <div class="seccion-titulo">📋 Exámenes Disponibles</div>
  <div id="listaExamenes"></div>

  <div class="seccion-titulo">📊 Tu Historial</div>
  <table>
    <thead>
      <tr>
        <th>Título</th>
        <th>Nota</th>
        <th>PDF</th>
      </tr>
    </thead>
    <tbody id="bodyHistorial"></tbody>
  </table>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let datosUsuario = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }
  const userSnap = await getDoc(doc(db, "usuarios", user.uid));
  if (userSnap.exists()) {
    datosUsuario = userSnap.data();
    document.getElementById("datosPersonales").innerHTML = `<b>${datosUsuario.nombres}</b><br>CI: ${datosUsuario.cedula} | ${datosUsuario.anio}° Año "${datosUsuario.seccion}"`;
    cargarExamenes(datosUsuario.anio, datosUsuario.seccion);
    cargarHistorial(user.uid, datosUsuario.anio, datosUsuario.seccion);
  }
});

async function cargarExamenes(anio, sec) {
  const lista = document.getElementById("listaExamenes");
  const q = query(collection(db, "examenes"), where("activo", "==", true), where("anio", "==", anio), where("seccion", "in", [sec, "Ambas"]));
  const snap = await getDocs(q);
  lista.innerHTML = snap.empty ? "No hay exámenes activos." : "";
  snap.forEach(d => {
    const ex = d.data();
    lista.innerHTML += `<div class="examen-card"><strong>${ex.titulo}</strong><br><button onclick="window.location.href='presentar-examen.html?id=${d.id}'" style="margin-top:10px; background:#00796b; color:white; border:none; padding:8px; border-radius:5px;">Iniciar</button></div>`;
  });
}

async function cargarHistorial(uid, anio, sec) {
  const body = document.getElementById("bodyHistorial");
  const qEx = query(collection(db, "examenes"), where("anio", "==", anio), where("seccion", "in", [sec, "Ambas"]));
  const snapEx = await getDocs(qEx);

  for (const docEx of snapEx.docs) {
    const resSnap = await getDocs(collection(db, `examenes/${docEx.id}/resultados`));
    resSnap.forEach(resDoc => {
      const res = resDoc.data();
      if (res.estudiante_id === uid) {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${docEx.data().titulo}</td><td><b>${res.nota}</b></td><td><button class="btn-pdf-examen" id="btnPdf_${resDoc.id}">📥</button></td>`;
        body.appendChild(tr);
        document.getElementById(`btnPdf_${resDoc.id}`).onclick = () => descargarExamenPDF(docEx.id, docEx.data().titulo, res.nota);
      }
    });
  }
}

// FUNCIÓN DE DESCARGA MEJORADA: Única modificación para asegurar el .pdf automático
function triggerDownload(docPDF, fileName) {
    const nombreConExtension = fileName.toLowerCase().endsWith('.pdf') ? fileName : fileName + '.pdf';
    try {
        docPDF.save(nombreConExtension);
    } catch (e) {
        const dataUri = docPDF.output('datauristring');
        const link = document.createElement('a');
        link.href = dataUri;
        link.download = nombreConExtension;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
}

window.descargarExamenPDF = async (exId, titulo, nota) => {
  const pregSnap = await getDocs(collection(db, "examenes", exId, "preguntas"));
  const { jsPDF } = window.jspdf;
  const docPDF = new jsPDF();
  docPDF.text("REPORTE DE EXAMEN - MATEEDUPRO", 105, 20, { align: "center" });
  docPDF.text(`Estudiante: ${datosUsuario.nombres}`, 20, 40);
  docPDF.text(`Examen: ${titulo} | Nota: ${nota}/20`, 20, 50);

  let y = 70;
  pregSnap.forEach((p, i) => {
    docPDF.text(`${i+1}. ${p.data().enunciado}`, 20, y);
    y += 10;
  });
  
  triggerDownload(docPDF, `Examen_${titulo}`);
};

window.cerrarSesion = () => signOut(auth).then(() => window.location.href = "login.html");
</script>
</body>
</html>
