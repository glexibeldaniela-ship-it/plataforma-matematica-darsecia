<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Panel Estudiante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <h2>Bienvenido Estudiante</h2>

  <h3>Examen Disponible</h3>

  <div id="listaExamenes"></div>

  <br>
  <button onclick="cerrarSesion()">Cerrar Sesión</button>

  <script type="module">

    import { auth, db } from "./firebase.js";
    import { signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const lista = document.getElementById("listaExamenes");

    async function cargarExamenActivo() {

      const q = query(
        collection(db, "examenes"),
        where("activo", "==", true)
      );

      const snapshot = await getDocs(q);

      if (snapshot.empty) {
        lista.innerHTML = "<p>No hay examen activo en este momento.</p>";
        return;
      }

      snapshot.forEach(doc => {

        const examen = doc.data();

        const div = document.createElement("div");
        div.style.border = "1px solid gray";
        div.style.padding = "15px";
        div.style.marginBottom = "15px";

        div.innerHTML = `
          <h4>${examen.titulo}</h4>
          <p>Año: ${examen.anio}</p>
          <p>Sección: ${examen.seccion}</p>
          <p>Duración: ${examen.duracion} minutos</p>

          <p><strong>Repaso obligatorio (2 minutos)</strong></p>
          <a href="${examen.repaso_link}" target="_blank">
            📘 Ver Repaso en Drive
          </a>

          <br><br>
          <p id="contador_${doc.id}">Disponible en 120 segundos</p>

          <button id="btn_${doc.id}" disabled>
            Iniciar Examen
          </button>
        `;

        lista.appendChild(div);

        iniciarTemporizador(doc.id);

      });

    }

    function iniciarTemporizador(id) {

      let tiempo = 120; // 2 minutos

      const contador = document.getElementById("contador_" + id);
      const boton = document.getElementById("btn_" + id);

      const intervalo = setInterval(() => {

        tiempo--;
        contador.textContent = "Disponible en " + tiempo + " segundos";

        if (tiempo <= 0) {
          clearInterval(intervalo);
          contador.textContent = "Puede iniciar el examen";
          boton.disabled = false;

          boton.onclick = () => {
            window.location.href = "presentar-examen.html?id=" + id;
          };
        }

      }, 1000);

    }

    window.cerrarSesion = function () {
      signOut(auth).then(() => {
        window.location.href = "login.html";
      });
    };

    cargarExamenActivo();

  </script>

</body>
</html>
