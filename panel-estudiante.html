<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Panel Estudiante</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="estilos.css">

<style>
/* ===== BODY ===== */
body{
  margin:0;
  padding:0;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:#f0f4f8;
}

/* ===== HEADER / MENU ===== */
.header{
  background:#00bcd4;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom-left-radius:12px;
  border-bottom-right-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.header h2{
  margin:0;
  font-size:1.4rem;
}

.header button{
  background:#00796b;
  border:none;
  color:white;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.header button:hover{
  background:#004d40;
}

/* ===== CONTENEDORES ===== */
.contenedor{
  padding:20px;
}

/* ===== DATOS PERSONALES ===== */
.datos-personales{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ===== EXAMENES DISPONIBLES ===== */
.lista-examenes div{
  background:white;
  border-radius:12px;
  padding:15px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.lista-examenes h4{
  margin-top:0;
}

.lista-examenes button{
  background:#ff9800;
  color:white;
  border:none;
  border-radius:10px;
  padding:10px;
  cursor:pointer;
  font-weight:bold;
}

.lista-examenes button:disabled{
  background:#ccc;
  cursor:default;
}

.lista-examenes button:hover:enabled{
  background:#fb8c00;
}

.lista-examenes a{
  color:#00bcd4;
  text-decoration:none;
  font-weight:bold;
}

/* ===== TABLA HISTORIAL ===== */
table{
  border-collapse: collapse;
  width:100%;
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

th, td{
  border:1px solid #ddd;
  padding:10px;
  text-align:left;
}

th{
  background:#00bcd4;
  color:white;
}

/* ===== RESUMEN ===== */
.resumen{
  margin-top:20px;
  padding:15px;
  border-radius:12px;
  background:#e0f7fa;
  font-weight:bold;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .header{
    flex-direction:column;
    text-align:center;
  }
  .lista-examenes div{
    padding:10px;
  }
  .lista-examenes button{
    width:100%;
    margin-top:10px;
  }
  table, th, td{
    font-size:12px;
    padding:6px;
  }
}
</style>
</head>
<body>

<div class="header">
  <h2>Panel Estudiante</h2>
  <button onclick="cerrarSesion()">Cerrar Sesión</button>
</div>

<div class="contenedor">

  <div id="datosPersonales" class="datos-personales"></div>

  <h3>Exámenes Disponibles</h3>
  <div id="listaExamenes" class="lista-examenes"></div>

  <h3>Historial de Exámenes</h3>
  <table id="tablaHistorial">
    <thead>
      <tr>
        <th>Título</th>
        <th>Año</th>
        <th>Sección</th>
        <th>Lapso</th>
        <th>Nota</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="resumen" id="estadisticasPersonales" style="display:none;">
    <strong>Total Exámenes:</strong> <span id="totalEx"></span> |
    <strong>Promedio:</strong> <span id="promedio"></span> |
    🟢 <strong>Aprobados:</strong> <span id="aprobados"></span> |
    🔴 <strong>Reprobados:</strong> <span id="reprobados"></span>
  </div>

</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { collection, getDocs, doc, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const lista = document.getElementById("listaExamenes");
const tablaHistorial = document.querySelector("#tablaHistorial tbody");
const datosPersonalesDiv = document.getElementById("datosPersonales");
const estadisticasDiv = document.getElementById("estadisticasPersonales");

const totalEx = document.getElementById("totalEx");
const promedioSpan = document.getElementById("promedio");
const aprobadosSpan = document.getElementById("aprobados");
const reprobadosSpan = document.getElementById("reprobados");

// 🔐 Verificar usuario y cargar datos
onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  // Cargar datos personales
  const userRef = doc(db, "usuarios", user.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    datosPersonalesDiv.innerHTML = "<p>Error: usuario no encontrado.</p>";
    return;
  }

  const data = userSnap.data();
  datosPersonalesDiv.innerHTML = `
    <strong>Nombre:</strong> ${data.nombres} ${data.apellidos} |
    <strong>Cédula:</strong> ${data.cedula} |
    <strong>Fecha de Nacimiento:</strong> ${data.fechaNacimiento} |
    <strong>Año:</strong> ${data.anio} |
    <strong>Sección:</strong> ${data.seccion}
  `;

  cargarExamenActivo();
  cargarHistorial(user.uid);
});

// Cerrar sesión
window.cerrarSesion = function () {
  signOut(auth).then(() => { window.location.href = "login.html"; });
};

// 🔹 Exámenes disponibles
async function cargarExamenActivo() {
  lista.innerHTML = "";
  const q = query(collection(db, "examenes"), where("activo", "==", true));
  const snapshot = await getDocs(q);

  if (snapshot.empty) {
    lista.innerHTML = "<p>No hay examen activo en este momento.</p>";
    return;
  }

  snapshot.forEach(docu => {
    const examen = docu.data();
    const div = document.createElement("div");
    div.innerHTML = `
      <h4>${examen.titulo}</h4>
      <p>Año: ${examen.anio}</p>
      <p>Sección: ${examen.seccion}</p>
      <p>Duración: ${examen.duracion || "-"} minutos</p>
      <p><strong>Repaso obligatorio (2 minutos)</strong></p>
      <a href="${examen.repaso_link || "#"}" target="_blank">📘 Ver Repaso en Drive</a>
      <br><br>
      <p id="contador_${docu.id}">Disponible en 120 segundos</p>
      <button id="btn_${docu.id}" disabled>Iniciar Examen</button>
    `;
    lista.appendChild(div);
    iniciarTemporizador(docu.id);
  });
}

function iniciarTemporizador(id) {
  let tiempo = 120;
  const contador = document.getElementById("contador_" + id);
  const boton = document.getElementById("btn_" + id);

  const intervalo = setInterval(() => {
    tiempo--;
    contador.textContent = "Disponible en " + tiempo + " segundos";
    if (tiempo <= 0) {
      clearInterval(intervalo);
      contador.textContent = "Puede iniciar el examen";
      boton.disabled = false;
      boton.onclick = () => { window.location.href = "presentar-examen.html?id=" + id; };
    }
  }, 1000);
}

// 🔹 Historial de exámenes
async function cargarHistorial(uid) {
  tablaHistorial.innerHTML = "";
  // FIX CONEJO: Declarar variable
  let resultadosGlobal = [];
  let total = 0, suma = 0, aprobados = 0, reprobados = 0;

  const examenesSnap = await getDocs(collection(db, "examenes"));
  for (const examenDoc of examenesSnap.docs) {
    const examenId = examenDoc.id;
    const examenData = examenDoc.data();

    const resultadosSnap = await getDocs(collection(db, `examenes/${examenId}/resultados`));
    resultadosSnap.forEach(resDoc => {
      const res = resDoc.data();
      // FIX CONEJO: Corregir campo de filtrado (estudiante_id en lugar de uid)
      if (res.estudiante_id === uid) {
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${examenData.titulo}</td>
          <td>${examenData.anio}</td>
          <td>${examenData.seccion}</td>
          <td>${examenData.lapso || "-"}</td>
          <td>${res.nota != null ? res.nota : "-"}</td>
          <td>${res.estado || "Sin presentar"}</td>
        `;
        tablaHistorial.appendChild(fila);

        if (res.nota != null && !isNaN(res.nota)) {
          total++; suma += Number(res.nota);
          if (Number(res.nota) >= 10) aprobados++; else reprobados++;
        }
      }
    });
  }

  if (total > 0) {
    totalEx.textContent = total;
    promedioSpan.textContent = (suma/total).toFixed(2);
    aprobadosSpan.textContent = aprobados;
    reprobadosSpan.textContent = reprobados;
    estadisticasDiv.style.display = "block";
  } else {
    estadisticasDiv.style.display = "none";
  }
}
</script>

</body>
</html>
