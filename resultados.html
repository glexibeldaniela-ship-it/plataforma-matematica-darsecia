<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultado del Examen - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --primary: #00796b;
    --primary-dark: #004d40;
    --secondary: #00bcd4;
    --success: #2e7d32;
    --danger: #c62828;
    --background: #f0f4f8;
  }
  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--background);
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  .header {
    width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; padding: 40px 0; text-align: center;
    border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
  }
  .contenedorResultado { width: 95%; max-width: 500px; margin-top: -30px; margin-bottom: 40px; }
  .card {
    background: white; border-radius: 20px; padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
  }
  .nota-valor { font-size: 3.5rem; font-weight: 800; margin: 0; }
  .status-badge {
    display: inline-block; padding: 8px 20px; border-radius: 50px;
    font-weight: bold; font-size: 0.9rem; margin-top: 10px;
  }
  .aprobado { color: var(--success); background: #e8f5e9; border: 1px solid var(--success); }
  .reprobado { color: var(--danger); background: #ffebee; border: 1px solid var(--danger); }
  .detalles-lista {
    text-align: left; margin: 25px 0; padding: 20px;
    background: #f9f9f9; border-radius: 15px;
  }
  .detalle-item {
    display: flex; justify-content: space-between;
    margin-bottom: 10px; font-size: 0.95rem;
    border-bottom: 1px dashed #ddd; padding-bottom: 5px;
  }
  .btn-pdf {
    background: #00bcd4; color: white; border: none;
    border-radius: 12px; padding: 15px; font-weight: bold;
    cursor: pointer; width: 100%; font-size: 1rem;
    box-shadow: 0 4px 15px rgba(0,188,212,0.3);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-volver { display: block; margin-top: 15px; color: var(--primary); text-decoration: none; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <h2 style="margin:0;">Resultado de Evaluación</h2>
</div>

<div class="contenedorResultado">
  <div id="resultado" class="card">
    <p>Cargando tus resultados...</p>
  </div>
  <br>
  <button id="btnPDF" class="btn-pdf" style="display:none;">
    📥 Descargar Acta y Examen PDF
  </button>
  <center><a href="panel-estudiante.html" class="btn-volver">⬅ Volver al Panel Estudiante</a></center>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const examenId = params.get("id");
const resultadoDiv = document.getElementById("resultado");
const btnPDF = document.getElementById("btnPDF");

let datosResultado = null;
let examenData = null;

// FUNCIÓN DE LIMPIEZA PROFUNDA PARA EVITAR CÓDIGOS RAROS EN PDF
function fixPDF(t) {
  if (t === null || t === undefined) return "N/P";
  // Elimina caracteres que causan conflictos y normaliza
  return t.toString().normalize("NFC").replace(/[^\x00-\x7F]/g, function(c) {
    const map = {'á':'a','é':'e','í':'i','ó':'o','ú':'u','Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U','ñ':'n','Ñ':'N'};
    return map[c] || c;
  });
}

onAuthStateChanged(auth, async (user) => {
  if(!user){ window.location.href="index.html"; return; }
  if(!examenId){ window.location.href="panel-estudiante.html"; return; }

  try {
    const examenSnap = await getDoc(doc(db,"examenes",examenId));
    examenData = examenSnap.data();

    const q = query(collection(db,"examenes",examenId,"resultados"), where("estudiante_id","==",user.uid));
    const querySnap = await getDocs(q);

    querySnap.forEach(docu => { datosResultado = docu.data(); });

    if(!datosResultado){
      resultadoDiv.innerHTML="<h3>No se encontró el resultado</h3>";
      return;
    }

    const esAprobado = datosResultado.nota >= 9.5;
    const colorNota = esAprobado ? "var(--success)" : "var(--danger)";

    resultadoDiv.innerHTML = `
      <h3 style="margin:0; color:var(--primary);">${examenData.titulo}</h3>
      <div class="nota-container">
        <p style="color:#666; font-size:0.8rem; margin-bottom:5px;">CALIFICACIÓN</p>
        <p class="nota-valor" style="color: ${colorNota}">${datosResultado.nota}</p>
        <span class="status-badge ${esAprobado ? 'aprobado' : 'reprobado'}">
          ${esAprobado ? '✅ APROBADO' : '❌ REPROBADO'}
        </span>
      </div>
      <div class="detalles-lista">
        <div class="detalle-item"><span>Estudiante:</span> <span>${datosResultado.nombre}</span></div>
        <div class="detalle-item"><span>Cédula:</span> <span>${datosResultado.cedula || "N/P"}</span></div>
        <div class="detalle-item"><span>Grado/Sección:</span> <span>${datosResultado.grado}° "${datosResultado.seccion}"</span></div>
      </div>
    `;
    btnPDF.style.display = "flex";

  } catch (error) {
    resultadoDiv.innerHTML = "<p>Error al cargar.</p>";
  }
});

btnPDF.addEventListener("click", () => {
  if(!datosResultado || !examenData) return;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');

  // --- MEMBRETE COMPLETO ---
  doc.setFont("helvetica", "bold");
  doc.setFontSize(9);
  doc.text("REPUBLICA BOLIVARIANA DE VENEZUELA", 105, 12, { align: "center" });
  doc.text("MINISTERIO DEL PODER POPULAR PARA LA EDUCACION", 105, 17, { align: "center" });
  doc.text("MUNICIPIO MARA - ESTADO ZULIA - PARROQUIA LA SIERRITA", 105, 22, { align: "center" });
  doc.text("UNIDAD EDUCATIVA ESTADAL CECILIA NUNEZ SUCRE", 105, 27, { align: "center" });

  doc.setLineWidth(0.4);
  doc.line(20, 32, 190, 32);

  // Título del Acta
  doc.setFontSize(14);
  doc.text("ACTA DE EVALUACION Y RESPUESTAS", 105, 42, { align: "center" });

  // Datos del Alumno
  doc.setFontSize(11);
  doc.setFont("helvetica", "normal");
  let y = 55;
  doc.text(`ESTUDIANTE: ${fixPDF(datosResultado.nombre).toUpperCase()}`, 25, y); y += 7;
  doc.text(`CEDULA: ${fixPDF(datosResultado.cedula)}`, 25, y); y += 7;
  doc.text(`EVALUACION: ${fixPDF(examenData.titulo).toUpperCase()}`, 25, y); y += 7;
  doc.text(`GRADO Y SECCION: ${datosResultado.grado} - ${datosResultado.seccion}`, 25, y); y += 10;

  doc.setFont("helvetica", "bold");
  doc.text(`CALIFICACION FINAL: ${datosResultado.nota} / 20 pts.`, 25, y); 
  y += 15;

  // --- DETALLE DE PREGUNTAS Y RESPUESTAS ---
  doc.setFontSize(12);
  doc.text("DETALLE DEL EXAMEN:", 25, y);
  y += 8;
  doc.setFontSize(10);
  doc.setFont("helvetica", "normal");

  if (datosResultado.respuestas_detalle && datosResultado.respuestas_detalle.length > 0) {
    datosResultado.respuestas_detalle.forEach((res, index) => {
      if (y > 250) { doc.addPage(); y = 20; }
      doc.setFont("helvetica", "bold");
      doc.text(`${index + 1}. Pregunta: ${fixPDF(res.enunciado)}`, 25, y); y += 6;
      doc.setFont("helvetica", "normal");
      doc.text(`Su respuesta: ${fixPDF(res.respuesta_estudiante)}`, 30, y);
      y += 8;
    });
  } else {
    doc.text("Detalle de respuestas no disponible en este registro.", 25, y);
    y += 10;
  }

  // --- PIE DE PAGINA Y FIRMA ---
  if (y > 230) { doc.addPage(); y = 50; } else { y = 230; }
  
  doc.setFont("helvetica", "bold");
  doc.line(65, y, 145, y);
  doc.text("JOSE FERNANDEZ", 105, y + 5, { align: "center" });
  doc.setFontSize(9);
  doc.text("C.I. 28.123.219", 105, y + 10, { align: "center" });
  doc.text("PROFESOR DE MATEMATICAS", 105, y + 15, { align: "center" });

  doc.save(`Examen_${datosResultado.nombre.replace(/ /g, "_")}.pdf`);
});
</script>
</body>
</html>
