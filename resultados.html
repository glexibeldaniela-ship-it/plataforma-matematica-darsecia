<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultado del Examen - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  :root {
    --primary: #00796b;
    --primary-dark: #004d40;
    --secondary: #00796b;
    --success: #2e7d32;
    --danger: #c62828;
    --background: #f0f4f8;
  }

  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--background);
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }

  .header {
    width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; padding: 40px 0; text-align: center;
    border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
  }

  .contenedorResultado { width: 95%; max-width: 500px; margin-top: -30px; margin-bottom: 40px; }

  .card {
    background: white; border-radius: 20px; padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
  }

  .nota-valor { font-size: 3.5rem; font-weight: 800; margin: 0; }
  
  .status-badge {
    display: inline-block; padding: 8px 20px; border-radius: 50px;
    font-weight: bold; font-size: 0.9rem; margin-top: 10px;
  }

  .aprobado { color: var(--success); background: #e8f5e9; border: 1px solid var(--success); }
  .reprobado { color: var(--danger); background: #ffebee; border: 1px solid var(--danger); }

  .detalles-lista {
    text-align: left; margin: 25px 0; padding: 20px;
    background: #f9f9f9; border-radius: 15px;
  }

  .detalle-item {
    display: flex; justify-content: space-between;
    margin-bottom: 10px; font-size: 0.95rem;
    border-bottom: 1px dashed #ddd; padding-bottom: 5px;
  }

  .btn-pdf {
    background: #00bcd4; color: white; border: none;
    border-radius: 12px; padding: 15px; font-weight: bold;
    cursor: pointer; width: 100%; font-size: 1rem;
    box-shadow: 0 4px 15px rgba(0,188,212,0.3);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }

  .btn-volver { display: block; margin-top: 15px; color: var(--primary); text-decoration: none; font-weight: 600; }
</style>
</head>

<body>

<div class="header">
  <h2 style="margin:0;">Resultado de Evaluación</h2>
</div>

<div class="contenedorResultado">
  <div id="resultado" class="card">
    <p>Cargando tus resultados...</p>
  </div>
  <br>
  <button id="btnPDF" class="btn-pdf" style="display:none;">
    📥 Descargar Acta Oficial PDF
  </button>
  <center><a href="panel-estudiante.html" class="btn-volver">⬅ Volver al Panel Estudiante</a></center>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const examenId = params.get("id");
const resultadoDiv = document.getElementById("resultado");
const btnPDF = document.getElementById("btnPDF");

let datosResultado = null;
let examenData = null;

// FUNCIÓN CLAVE PARA ARREGLAR ACENTOS EN EL PDF
function fixTxt(t) {
  if (!t) return "N/P";
  // Normaliza y asegura que los caracteres especiales se mantengan legibles
  return t.toString().normalize("NFC");
}

onAuthStateChanged(auth, async (user) => {
  if(!user){ window.location.href="index.html"; return; }
  if(!examenId){ window.location.href="panel-estudiante.html"; return; }

  try {
    const examenSnap = await getDoc(doc(db,"examenes",examenId));
    examenData = examenSnap.data();

    const q = query(collection(db,"examenes",examenId,"resultados"), where("estudiante_id","==",user.uid));
    const querySnap = await getDocs(q);

    querySnap.forEach(docu => { datosResultado = docu.data(); });

    if(!datosResultado){
      resultadoDiv.innerHTML="<h3>No se encontró el resultado</h3>";
      return;
    }

    const esAprobado = datosResultado.nota >= 9.5;
    const colorNota = esAprobado ? "var(--success)" : "var(--danger)";

    resultadoDiv.innerHTML = `
      <h3 style="margin:0; color:var(--primary);">${examenData.titulo}</h3>
      <div class="nota-container">
        <p style="color:#666; font-size:0.8rem; margin-bottom:5px;">CALIFICACIÓN</p>
        <p class="nota-valor" style="color: ${colorNota}">${datosResultado.nota}</p>
        <span class="status-badge ${esAprobado ? 'aprobado' : 'reprobado'}">
          ${esAprobado ? '✅ APROBADO' : '❌ REPROBADO'}
        </span>
      </div>
      <div class="detalles-lista">
        <div class="detalle-item"><span>Estudiante:</span> <span>${datosResultado.nombre}</span></div>
        <div class="detalle-item"><span>Cédula:</span> <span>${datosResultado.cedula || "N/P"}</span></div>
        <div class="detalle-item"><span>Año/Sección:</span> <span>${datosResultado.grado || "1"}° "${datosResultado.seccion || "A"}"</span></div>
      </div>
    `;
    btnPDF.style.display = "flex";

  } catch (error) {
    resultadoDiv.innerHTML = "<p>Error al cargar.</p>";
  }
});

btnPDF.addEventListener("click", () => {
  if(!datosResultado || !examenData) return;

  const { jsPDF } = window.jspdf;
  // Usamos 'p' (portrait), 'mm' y 'a4'
  const doc = new jsPDF('p', 'mm', 'a4');

  // Forzamos el uso de una fuente estándar que soporte latín
  doc.setFont("helvetica", "bold");
  doc.setFontSize(10);
  
  // Encabezado corregido
  doc.text("REPÚBLICA BOLIVARIANA DE VENEZUELA", 105, 15, { align: "center" });
  doc.text("MINISTERIO DEL PODER POPULAR PARA LA EDUCACIÓN", 105, 20, { align: "center" });
  doc.text("U.E.E. CECILIA NÚÑEZ SUCRE", 105, 25, { align: "center" });
  
  doc.setFont("helvetica", "normal");
  doc.setFontSize(8);
  doc.text("LA SIERRITA - MUNICIPIO MARA - ESTADO ZULIA", 105, 30, { align: "center" });

  doc.setLineWidth(0.5);
  doc.line(20, 35, 190, 35);

  doc.setFontSize(14);
  doc.setFont("helvetica", "bold");
  doc.text("ACTA DE EVALUACIÓN DIGITAL", 105, 45, { align: "center" });

  doc.setFontSize(11);
  doc.setFont("helvetica", "normal");
  
  let y = 60;
  const x = 25;

  // Usamos la función fixTxt para asegurar que el texto sea procesado bien
  doc.text(`Por medio de la presente se hace constar el resultado del estudiante:`, x, y);
  y += 12;
  doc.setFont("helvetica", "bold");
  doc.text(`ESTUDIANTE: ${fixTxt(datosResultado.nombre).toUpperCase()}`, x, y); y += 8;
  doc.text(`CÉDULA: ${fixTxt(datosResultado.cedula)}`, x, y); y += 8;
  doc.text(`EXAMEN: ${fixTxt(examenData.titulo).toUpperCase()}`, x, y); y += 8;
  doc.text(`AÑO Y SECCIÓN: ${datosResultado.grado}° "${datosResultado.seccion}"`, x, y); y += 15;

  doc.setFontSize(13);
  doc.text(`CALIFICACIÓN: ${datosResultado.nota} / 20 pts.`, x, y); y += 20;

  const hoy = new Date().toLocaleDateString();
  doc.setFontSize(10);
  doc.setFont("helvetica", "italic");
  doc.text(`Documento emitido de forma digital el día: ${hoy}`, x, y);

  // Firma del Docente (Tus datos)
  doc.setFont("helvetica", "bold");
  doc.line(70, 120, 140, 120);
  doc.text("JOSÉ FERNÁNDEZ", 105, 125, { align: "center" });
  doc.setFontSize(9);
  doc.text("C.I. 28.123.219", 105, 130, { align: "center" });
  doc.text("Docente Evaluador", 105, 135, { align: "center" });

  doc.save(`Resultado_${datosResultado.nombre.replace(/ /g, "_")}.pdf`);
});
</script>

</body>
</html>
