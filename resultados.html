<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultado del Examen - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --primary: #00796b;
    --primary-dark: #004d40;
    --secondary: #00665b;
    --success: #2e7d32;
    --danger: #c62828;
    --background: #f0f4f8;
  }
  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--background);
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  .header {
    width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; padding: 40px 0; text-align: center;
    border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
  }
  .contenedorResultado { width: 95%; max-width: 500px; margin-top: -30px; margin-bottom: 40px; }
  .card {
    background: white; border-radius: 20px; padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
  }
  .nota-valor { font-size: 3.5rem; font-weight: 800; margin: 0; }
  .status-badge {
    display: inline-block; padding: 8px 20px; border-radius: 50px;
    font-weight: bold; font-size: 0.9rem; margin-top: 10px;
  }
  .aprobado { color: var(--success); background: #e8f5e9; border: 1px solid var(--success); }
  .reprobado { color: var(--danger); background: #ffebee; border: 1px solid var(--danger); }
  .detalles-lista {
    text-align: left; margin: 25px 0; padding: 20px;
    background: #f9f9f9; border-radius: 15px;
  }
  .detalle-item {
    display: flex; justify-content: space-between;
    margin-bottom: 10px; font-size: 0.95rem;
    border-bottom: 1px dashed #ddd; padding-bottom: 5px;
  }
  .btn-pdf {
    background: #00bcd4; color: white; border: none;
    border-radius: 12px; padding: 15px; font-weight: bold;
    cursor: pointer; width: 100%; font-size: 1rem;
    box-shadow: 0 4px 15px rgba(0,188,212,0.3);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-volver { display: block; margin-top: 15px; color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h2 style="margin:0;">Resultado de Evaluación</h2>
</div>

<div class="contenedorResultado">
  <div id="resultado" class="card">
    <p>Cargando resultados...</p>
  </div>
  <br>
  <button id="btnPDF" class="btn-pdf" style="display:none;">
    📥 Descargar Acta y Examen PDF
  </button>
  <center><a id="lnkVolver" class="btn-volver">⬅ Volver al Panel</a></center>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const examenId = params.get("id");
const estudianteIdUrl = params.get("estudiante");

const resultadoDiv = document.getElementById("resultado");
const btnPDF = document.getElementById("btnPDF");
const lnkVolver = document.getElementById("lnkVolver");

let datosResultado = null;
let examenData = null;

function fixPDF(t) {
  if (t === null || t === undefined) return "N/P";
  const map = {
    'á':'a','é':'e','í':'i','ó':'o','ú':'u',
    'Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U',
    'ñ':'n','Ñ':'N','ü':'u','Ü':'U'
  };
  return t.toString().normalize("NFC").replace(/[áéíóúÁÉÍÓÚñÑüÜ]/g, function(c) { return map[c] || c; });
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "index.html"; return; }

  if (estudianteIdUrl) {
    lnkVolver.href = "panel-profesor.html";
    lnkVolver.innerText = "⬅ Volver al Panel Profesor";
  } else {
    lnkVolver.href = "panel-estudiante.html";
    lnkVolver.innerText = "⬅ Volver al Panel Estudiante";
  }

  if (!examenId) {
    resultadoDiv.innerHTML = "<h3>No se especificó un examen.</h3>";
    return;
  }

  try {
    const examenSnap = await getDoc(doc(db, "examenes", examenId));
    if (!examenSnap.exists()) {
      resultadoDiv.innerHTML = "<h3>El examen no existe.</h3>";
      return;
    }
    examenData = examenSnap.data();

    const targetId = estudianteIdUrl || user.uid;
    const resSnap = await getDoc(doc(db, "examenes", examenId, "resultados", targetId));

    if (!resSnap.exists()) {
      resultadoDiv.innerHTML = "<h3 style='color:#c62828;'>No se encontró el resultado.</h3><p style='color:#666;'>El estudiante aún no ha completado esta evaluación.</p>";
      return;
    }

    datosResultado = resSnap.data();
    const esAprobado = datosResultado.nota >= 9.5;
    const colorNota = esAprobado ? "var(--success)" : "var(--danger)";

    resultadoDiv.innerHTML = `
      <h3 style="margin:0; color:var(--primary);">${examenData.titulo}</h3>
      <div class="nota-container">
        <p style="color:#666; font-size:0.8rem; margin-bottom:5px;">CALIFICACIÓN</p>
        <p class="nota-valor" style="color:${colorNota};">${datosResultado.nota}</p>
        <span class="status-badge ${esAprobado ? 'aprobado' : 'reprobado'}">
          ${esAprobado ? '✅ APROBADO' : '❌ REPROBADO'}
        </span>
      </div>
      <div class="detalles-lista">
        <div class="detalle-item"><span>Estudiante:</span><span>${datosResultado.nombre || "N/P"}</span></div>
        <div class="detalle-item"><span>Cédula:</span><span>${datosResultado.cedula || "N/P"}</span></div>
        <div class="detalle-item"><span>Grado/Sección:</span><span>${datosResultado.grado || "?"}° "${datosResultado.seccion || "?"}"</span></div>
      </div>`;

    btnPDF.style.display = "flex";

  } catch (error) {
    resultadoDiv.innerHTML = "<p>Error al cargar el resultado.</p>";
    console.error(error);
  }
});

btnPDF.addEventListener("click", function() {
  if (!datosResultado || !examenData) return;

  const { jsPDF } = window.jspdf;
  const docPDF = new jsPDF("p", "mm", "a4");
  const margenIzq = 20;
  const margenDer = 190;
  const anchoMax = 170;

  function saltoPag(y, espacio) {
    if (y + espacio > 270) { docPDF.addPage(); return 20; }
    return y;
  }

  // MEMBRETE
  docPDF.setFont("helvetica", "bold");
  docPDF.setFontSize(9);
  docPDF.text("REPÚBLICA BOLIVARIANA DE VENEZUELA", 105, 13, { align: "center" });
  docPDF.text("MINISTERIO DEL PODER POPULAR PARA LA EDUCACIÓN", 105, 18, { align: "center" });
  docPDF.text("MUNICIPIO MARA - ESTADO ZULIA - PARROQUIA LA SIERRITA", 105, 23, { align: "center" });
  docPDF.setFont("helvetica", "normal");
  docPDF.text("UNIDAD EDUCATIVA ESTADAL CECILIA NÚÑEZ SUCRE", 105, 28, { align: "center" });
  docPDF.setLineWidth(0.5);
  docPDF.line(margenIzq, 32, margenDer, 32);

  docPDF.setFontSize(13);
  docPDF.setFont("helvetica", "bold");
  docPDF.text("ACTA DE EVALUACIÓN DIGITAL", 105, 41, { align: "center" });

  // DATOS DEL ESTUDIANTE
  var y = 53;
  docPDF.setFontSize(10);
  docPDF.setFont("helvetica", "normal");
  docPDF.text("Evaluación realizada por el sistema MateEduPro:", margenIzq, y); y += 9;
  docPDF.setFont("helvetica", "bold");
  docPDF.text("ESTUDIANTE: " + fixPDF(datosResultado.nombre || "N/P").toUpperCase(), margenIzq, y); y += 7;
  docPDF.text("CÉDULA: " + fixPDF(datosResultado.cedula || "N/P"), margenIzq, y); y += 7;
  docPDF.text("EVALUACIÓN: " + fixPDF(examenData.titulo || "").toUpperCase(), margenIzq, y); y += 7;
  docPDF.text("GRADO Y SECCIÓN: " + (datosResultado.grado || "?") + " - Sección " + (datosResultado.seccion || "?"), margenIzq, y); y += 7;
  
  docPDF.setLineWidth(0.3);
  docPDF.line(margenIzq, y + 1, margenDer, y + 1); y += 8;

  // DETALLE DE PREGUNTAS Y RESPUESTAS
  docPDF.setFontSize(11);
  docPDF.setFont("helvetica", "bold");
  docPDF.text("DETALLE DE LA EVALUACIÓN:", 105, y, { align: "center" }); y += 8;

  var detalle = datosResultado.respuestas_detalle || [];
  var correctasCont = 0;
  var totalPregs = detalle.length;

  detalle.forEach(function(item, idx) {
    var textoPrg = fixPDF(item.enunciado || ("Pregunta " + (idx + 1)));
    var linesPrg = docPDF.splitTextToSize((idx + 1) + ". " + textoPrg, anchoMax);
    y = saltoPag(y, linesPrg.length * 5 + 18);

    docPDF.setFontSize(9);
    docPDF.setFont("helvetica", "bold");
    docPDF.text(linesPrg, margenIzq, y); y += linesPrg.length * 5 + 1;

    var esCorrecta = item.resultado === "Correcta";
    if (esCorrecta) correctasCont++;

    docPDF.setFont("helvetica", "normal");
    var iconoR = esCorrecta ? "[OK] " : "[X]  ";
    var respTxt = fixPDF(item.respuesta_estudiante || "Sin respuesta");
    var linesResp = docPDF.splitTextToSize(iconoR + "Respuesta: " + respTxt, anchoMax);
    docPDF.text(linesResp, margenIzq + 3, y); y += linesResp.length * 5 + 4;
  });

  if (totalPregs === 0) {
    docPDF.setFont("helvetica", "italic");
    docPDF.setFontSize(9);
    docPDF.text("No se encontraron respuestas detalladas para esta evaluación.", margenIzq, y); y += 8;
  }

  // CALIFICACIÓN FINAL
  y = saltoPag(y, 40);
  docPDF.setLineWidth(0.4);
  docPDF.line(margenIzq, y, margenDer, y); y += 8;
  docPDF.setFontSize(11);
  docPDF.setFont("helvetica", "bold");
  docPDF.text("CALIFICACIÓN FINAL: " + datosResultado.nota + " / 20 pts.", margenIzq, y); y += 7;
  var aprobadoPDF = datosResultado.nota >= 9.5;
  docPDF.text("ESTADO: " + (aprobadoPDF ? "APROBADO" : "REPROBADO"), margenIzq, y); y += 9;
  
  docPDF.setFontSize(9);
  docPDF.setFont("helvetica", "italic");
  docPDF.text("Fecha de emisión: " + new Date().toLocaleDateString("es-VE"), margenIzq, y);

  // FIRMA
  y = saltoPag(y, 40);
  y += 18;
  docPDF.setLineWidth(0.5);
  docPDF.line(65, y, 145, y); y += 5;
  docPDF.setFont("helvetica", "bold");
  docPDF.setFontSize(10);
  docPDF.text("JOSÉ FERNÁNDEZ", 105, y, { align: "center" }); y += 5;
  docPDF.setFontSize(9);
  docPDF.text("C.I. 28.123.219", 105, y, { align: "center" }); y += 5;
  docPDF.text("PROFESOR DE MATEMÁTICAS", 105, y, { align: "center" });

  docPDF.save("Acta_" + fixPDF(datosResultado.nombre || "Alumno").replace(/ /g, "_") + ".pdf");
});
</script>
</body>
</html>
