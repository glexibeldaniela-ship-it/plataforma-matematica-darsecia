<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultado del Examen - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --primary: #00796b;
    --primary-dark: #004d40;
    --secondary: #00665b;
    --success: #2e7d32;
    --danger: #c62828;
    --background: #f0f4f8;
  }
  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--background);
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  .header {
    width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; padding: 40px 0; text-align: center;
    border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
  }
  .contenedorResultado { width: 95%; max-width: 500px; margin-top: -30px; margin-bottom: 40px; }
  .card {
    background: white; border-radius: 20px; padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
  }
  .nota-valor { font-size: 3.5rem; font-weight: 800; margin: 0; }
  .status-badge {
    display: inline-block; padding: 8px 20px; border-radius: 50px;
    font-weight: bold; font-size: 0.9rem; margin-top: 10px;
  }
  .aprobado { color: var(--success); background: #e8f5e9; border: 1px solid var(--success); }
  .reprobado { color: var(--danger); background: #ffebee; border: 1px solid var(--danger); }
  .detalles-lista {
    text-align: left; margin: 25px 0; padding: 20px;
    background: #f9f9f9; border-radius: 15px;
  }
  .detalle-item {
    display: flex; justify-content: space-between;
    margin-bottom: 10px; font-size: 0.95rem;
    border-bottom: 1px dashed #ddd; padding-bottom: 5px;
  }
  .btn-pdf {
    background: #00bcd4; color: white; border: none;
    border-radius: 12px; padding: 15px; font-weight: bold;
    cursor: pointer; width: 100%; font-size: 1rem;
    box-shadow: 0 4px 15px rgba(0,188,212,0.3);
    display: flex; align-items: center; justify-content: center; gap: 10px;
  }
  .btn-volver { display: block; margin-top: 15px; color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h2 style="margin:0;">Resultado de Evaluación</h2>
</div>

<div class="contenedorResultado">
  <div id="resultado" class="card">
    <p>Cargando resultados...</p>
  </div>
  <br>
  <button id="btnPDF" class="btn-pdf" style="display:none;">
    📥 Descargar Acta y Examen PDF
  </button>
  <center><a id="lnkVolver" class="btn-volver">⬅ Volver al Panel</a></center>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const examenId = params.get("id");
const estudianteIdUrl = params.get("estudiante");

const resultadoDiv = document.getElementById("resultado");
const btnPDF = document.getElementById("btnPDF");
const lnkVolver = document.getElementById("lnkVolver");

let datosResultado = null;
let examenData = null;

// Función para limpiar caracteres especiales en el PDF (Evita errores de renderizado)
const fixPDF = (texto) => {
  if (!texto) return "N/P";
  const acentos = {'á':'a','é':'e','í':'i','ó':'o','ú':'u','Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U','ñ':'n','Ñ':'N'};
  return texto.toString().split('').map( letra => acentos[letra] || letra).join('').normalize("NFC");
};

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }

  // Detectar si venimos del panel profesor o estudiante
  if (estudianteIdUrl) {
    lnkVolver.href = "panel-profesor.html";
    lnkVolver.innerText = "⬅ Volver al Panel Profesor";
  } else {
    lnkVolver.href = "panel-estudiante.html";
    lnkVolver.innerText = "⬅ Volver al Panel Estudiante";
  }

  if (!examenId) {
    resultadoDiv.innerHTML = "<h3>No se especificó un examen.</h3>";
    return;
  }

  try {
    // 1. Obtener datos del examen (La fuente de verdad)
    const examenSnap = await getDoc(doc(db, "examenes", examenId));
    if (!examenSnap.exists()) {
      resultadoDiv.innerHTML = "<h3>El examen ya no existe en la base de datos.</h3>";
      return;
    }
    examenData = examenSnap.data();

    // 2. Obtener el resultado (Si es prof ve al alumno, si es alumno se ve a sí mismo)
    const targetId = estudianteIdUrl || user.uid;
    const resSnap = await getDoc(doc(db, "examenes", examenId, "resultados", targetId));

    if (!resSnap.exists()) {
      resultadoDiv.innerHTML = "<h3 style='color:#c62828;'>Sin registro.</h3><p>Aún no hay respuestas guardadas.</p>";
      return;
    }

    datosResultado = resSnap.data();
    const esAprobado = datosResultado.nota >= 9.5;
    const colorNota = esAprobado ? "var(--success)" : "var(--danger)";

    resultadoDiv.innerHTML = `
      <h3 style="margin:0; color:var(--primary);">${examenData.titulo}</h3>
      <div class="nota-container">
        <p style="color:#666; font-size:0.8rem; margin-bottom:5px;">CALIFICACIÓN</p>
        <p class="nota-valor" style="color:${colorNota};">${datosResultado.nota}</p>
        <span class="status-badge ${esAprobado ? 'aprobado' : 'reprobado'}">
          ${esAprobado ? '✅ APROBADO' : '❌ REPROBADO'}
        </span>
      </div>
      <div class="detalles-lista">
        <div class="detalle-item"><span>Estudiante:</span><span>${datosResultado.nombre || "N/P"}</span></div>
        <div class="detalle-item"><span>Cédula:</span><span>${datosResultado.cedula || "N/P"}</span></div>
        <div class="detalle-item"><span>Sección:</span><span>${datosResultado.grado || "?"}° "${datosResultado.seccion || "?"}"</span></div>
      </div>`;

    btnPDF.style.display = "flex";

  } catch (error) {
    console.error("Error al cargar resultados:", error);
    resultadoDiv.innerHTML = "<p>Error crítico al conectar con el servidor.</p>";
  }
});

btnPDF.addEventListener("click", () => {
  if (!datosResultado || !examenData) return;

  const { jsPDF } = window.jspdf;
  const docGenerado = new jsPDF("p", "mm", "a4");
  const anchoMax = 170;
  let posY = 53;

  const checkSalto = (espacio) => {
    if (posY + espacio > 275) { docGenerado.addPage(); posY = 25; }
  };

  // Cabecera institucional
  docGenerado.setFont("helvetica", "bold").setFontSize(9);
  docGenerado.text("REPÚBLICA BOLIVARIANA DE VENEZUELA", 105, 13, { align: "center" });
  docGenerado.text("MINISTERIO DEL PODER POPULAR PARA LA EDUCACIÓN", 105, 18, { align: "center" });
  docGenerado.text("U.E.E. CECILIA NÚÑEZ SUCRE - MATEEDUPRO", 105, 23, { align: "center" });
  docGenerado.line(20, 28, 190, 28);

  docGenerado.setFontSize(14).text("ACTA DE EVALUACIÓN DETALLADA", 105, 40, { align: "center" });

  // Datos del alumno
  docGenerado.setFontSize(10).setFont("helvetica", "normal");
  docGenerado.text(`ESTUDIANTE: ${fixPDF(datosResultado.nombre).toUpperCase()}`, 20, posY); posY += 7;
  docGenerado.text(`CÉDULA: ${datosResultado.cedula || "N/P"}`, 20, posY); posY += 7;
  docGenerado.text(`EVALUACIÓN: ${fixPDF(examenData.titulo).toUpperCase()}`, 20, posY); posY += 12;

  // LÓGICA DE DETALLE: Cruce de Examen vs Respuestas
  docGenerado.setFont("helvetica", "bold").text("REVISIÓN DE PREGUNTAS:", 20, posY); posY += 8;

  // Obtenemos las respuestas del alumno (diccionario id: valor)
  const respuestasAlumno = datosResultado.respuestas || {};
  const preguntasExamen = examenData.preguntas || [];

  preguntasExamen.forEach((pregunta, index) => {
    const num = index + 1;
    const enunciado = fixPDF(pregunta.texto || pregunta.enunciado);
    const lineasEnunciado = docGenerado.splitTextToSize(`${num}. ${enunciado}`, anchoMax);
    
    checkSalto(lineasEnunciado.length * 7 + 15);
    
    docGenerado.setFont("helvetica", "bold").setFontSize(9);
    docGenerado.text(lineasEnunciado, 20, posY);
    posY += (lineasEnunciado.length * 5) + 2;

    // Obtener qué respondió el alumno para esta pregunta
    const rAlumno = respuestasAlumno[index] !== undefined ? respuestasAlumno[index] : "Sin responder";
    const esCorrecta = String(rAlumno).trim() === String(pregunta.respuestaCorrecta).trim();

    docGenerado.setFont("helvetica", "normal");
    docGenerado.text(`   Respuesta: ${fixPDF(rAlumno)}`, 20, posY);
    
    if (esCorrecta) {
        docGenerado.setTextColor(46, 125, 50); // Verde
        docGenerado.text("   [CORRECTO]", 150, posY);
    } else {
        docGenerado.setTextColor(198, 40, 40); // Rojo
        docGenerado.text(`   [INCORRECTO] Sugerida: ${fixPDF(pregunta.respuestaCorrecta)}`, 100, posY);
    }
    
    docGenerado.setTextColor(0, 0, 0);
    posY += 8;
  });

  // Nota final
  checkSalto(30);
  posY += 5;
  docGenerado.setLineWidth(0.5).line(20, posY, 190, posY); posY += 10;
  docGenerado.setFontSize(12).setFont("helvetica", "bold");
  docGenerado.text(`CALIFICACIÓN OBTENIDA: ${datosResultado.nota} / 20 pts.`, 20, posY);
  
  // Firma Digitalizada
  posY += 30;
  checkSalto(20);
  docGenerado.line(70, posY, 140, posY); posY += 5;
  docGenerado.setFontSize(10).text("PROF. JOSÉ FERNÁNDEZ", 105, posY, { align: "center" });
  docGenerado.setFontSize(8).text("VALIDADO POR MATEEDUPRO", 105, posY + 4, { align: "center" });

  docGenerado.save(`Reporte_${fixPDF(datosResultado.nombre).replace(/ /g, "_")}.pdf`);
});
</script>
</body>
</html>
