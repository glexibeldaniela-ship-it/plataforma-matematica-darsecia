<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Resultado del Examen - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --primary: #00796b;
    --primary-dark: #004d40;
    --secondary: #00665b;
    --success: #2e7d32;
    --danger: #c62828;
    --background: #f0f4f8;
  }
  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--background);
    display: flex; flex-direction: column; align-items: center; min-height: 100vh;
  }
  .header {
    width: 100%; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white; padding: 40px 0; text-align: center;
    border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
  }
  .contenedorResultado { width: 95%; max-width: 500px; margin-top: -30px; margin-bottom: 40px; }
  .card {
    background: white; border-radius: 20px; padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
  }
  .nota-valor { font-size: 3.5rem; font-weight: 800; margin: 0; }
  .status-badge {
    display: inline-block; padding: 8px 20px; border-radius: 50px;
    font-weight: bold; font-size: 0.9rem; margin-top: 10px;
  }
  .aprobado { color: var(--success); background: #e8f5e9; border: 1px solid var(--success); }
  .reprobado { color: var(--danger); background: #ffebee; border: 1px solid var(--danger); }
  .detalles-lista {
    text-align: left; margin: 25px 0; padding: 20px;
    background: #f9f9f9; border-radius: 15px;
  }
  .detalle-item {
    display: flex; justify-content: space-between;
    margin-bottom: 10px; font-size: 0.95rem;
    border-bottom: 1px dashed #ddd; padding-bottom: 5px;
  }
  .btn-pdf {
    background: #00bcd4; color: white; border: none;
    border-radius: 12px; padding: 15px; font-weight: bold;
    cursor: pointer; width: 100%; font-size: 1rem;
    box-shadow: 0 4px 15px rgba(0,188,212,0.3);
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: 0.3s;
  }
  .btn-pdf:hover { background: #0097a7; }
  .btn-volver { display: block; margin-top: 15px; color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="header">
  <h2 style="margin:0;">Resultado de Evaluación</h2>
</div>

<div class="contenedorResultado">
  <div id="resultado" class="card">
    <p>Cargando resultados...</p>
  </div>
  <br>
  <button id="btnPDF" class="btn-pdf" style="display:none;">
    📥 Descargar Acta y Examen PDF
  </button>
  <center><a id="lnkVolver" class="btn-volver">⬅ Volver al Panel</a></center>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const examenId = params.get("id");
const estudianteIdUrl = params.get("estudiante");

const resultadoDiv = document.getElementById("resultado");
const btnPDF = document.getElementById("btnPDF");
const lnkVolver = document.getElementById("lnkVolver");

let datosResultado = null;
let examenData = null;

// Limpieza de caracteres para el PDF
function fixPDF(t) {
  if (!t) return "N/P";
  const map = {'á':'a','é':'e','í':'i','ó':'o','ú':'u','Á':'A','É':'E','Í':'I','Ó':'O','Ú':'U','ñ':'n','Ñ':'N','ü':'u','Ü':'U'};
  return t.toString().normalize("NFC").replace(/[áéíóúÁÉÍÓÚñÑüÜ]/g, (c) => map[c] || c);
}

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = "login.html"; return; }

  if (estudianteIdUrl) {
    lnkVolver.href = "panel-profesor.html";
    lnkVolver.innerText = "⬅ Volver al Panel Profesor";
  } else {
    lnkVolver.href = "panel-estudiante.html";
    lnkVolver.innerText = "⬅ Volver al Panel Estudiante";
  }

  if (!examenId) {
    resultadoDiv.innerHTML = "<h3>No se especificó un examen.</h3>";
    return;
  }

  try {
    const examenSnap = await getDoc(doc(db, "examenes", examenId));
    if (!examenSnap.exists()) {
      resultadoDiv.innerHTML = "<h3>El examen no existe.</h3>";
      return;
    }
    examenData = examenSnap.data();

    const targetId = estudianteIdUrl || user.uid;
    const resSnap = await getDoc(doc(db, "examenes", examenId, "resultados", targetId));

    if (!resSnap.exists()) {
      resultadoDiv.innerHTML = "<h3 style='color:#c62828;'>No se encontró el resultado.</h3><p>El estudiante aún no ha completado esta evaluación.</p>";
      return;
    }

    datosResultado = resSnap.data();
    const esAprobado = datosResultado.nota >= 9.5;
    const colorNota = esAprobado ? "var(--success)" : "var(--danger)";

    resultadoDiv.innerHTML = `
      <h3 style="margin:0; color:var(--primary);">${examenData.titulo}</h3>
      <div class="nota-container">
        <p style="color:#666; font-size:0.8rem; margin-bottom:5px;">CALIFICACIÓN</p>
        <p class="nota-valor" style="color:${colorNota};">${datosResultado.nota}</p>
        <span class="status-badge ${esAprobado ? 'aprobado' : 'reprobado'}">
          ${esAprobado ? '✅ APROBADO' : '❌ REPROBADO'}
        </span>
      </div>
      <div class="detalles-lista">
        <div class="detalle-item"><span>Estudiante:</span><span>${datosResultado.nombre || "N/P"}</span></div>
        <div class="detalle-item"><span>Cédula:</span><span>${datosResultado.cedula || "N/P"}</span></div>
        <div class="detalle-item"><span>Grado/Sección:</span><span>${datosResultado.grado || "?"}° "${datosResultado.seccion || "?"}"</span></div>
      </div>`;

    btnPDF.style.display = "flex";

  } catch (error) {
    resultadoDiv.innerHTML = "<p>Error al cargar el resultado.</p>";
    console.error(error);
  }
});

btnPDF.addEventListener("click", function() {
  if (!datosResultado || !examenData) return;

  const { jsPDF } = window.jspdf;
  const docPDF = new jsPDF("p", "mm", "a4");
  const margenIzq = 20;
  const margenDer = 190;
  const anchoMax = 170;

  function checkPage(y, espacio) {
    if (y + espacio > 275) { docPDF.addPage(); return 25; }
    return y;
  }

  // --- MEMBRETE OFICIAL ACTUALIZADO ---
  docPDF.setFont("helvetica", "bold").setFontSize(9);
  docPDF.text("REPÚBLICA BOLIVARIANA DE VENEZUELA", 105, 12, { align: "center" });
  docPDF.text("MINISTERIO DEL PODER POPULAR PARA LA EDUCACIÓN", 105, 17, { align: "center" });
  docPDF.text("MUNICIPIO MARA - PARROQUIA LA SIERRITA - ESTADO ZULIA", 105, 22, { align: "center" });
  docPDF.text("UNIDAD EDUCATIVA ESTATAL CECILIA NÚÑEZ SUCRE", 105, 27, { align: "center" });
  docPDF.setLineWidth(0.5).line(margenIzq, 30, margenDer, 30);

  docPDF.setFontSize(14).text("ACTA DE EVALUACIÓN DIGITAL", 105, 40, { align: "center" });

  // --- DATOS DEL ESTUDIANTE ---
  let y = 52;
  docPDF.setFontSize(10).setFont("helvetica", "normal");
  docPDF.text(`ESTUDIANTE: ${fixPDF(datosResultado.nombre).toUpperCase()}`, margenIzq, y); y += 6;
  docPDF.text(`CÉDULA: ${datosResultado.cedula || "N/P"}`, margenIzq, y); y += 6;
  docPDF.text(`EVALUACIÓN: ${fixPDF(examenData.titulo).toUpperCase()}`, margenIzq, y); y += 6;
  docPDF.text(`GRADO Y SECCIÓN: ${datosResultado.grado || "?"}° "${datosResultado.seccion || "?"}"`, margenIzq, y); y += 10;

  docPDF.setLineWidth(0.3).line(margenIzq, y, margenDer, y); y += 8;

  // --- DETALLE DE REVISIÓN ---
docPDF.setFont("helvetica", "bold").setFontSize(10);
docPDF.text("REVISIÓN DE RESPUESTAS:", margenIzq, y); 
y += 8;

const preguntas = Array.isArray(examenData.preguntas) ? examenData.preguntas : [];
// Usamos "respuestas_detalle" como fuente principal de los resultados
const detalleRespuestas = Array.isArray(datosResultado.respuestas_detalle) 
  ? datosResultado.respuestas_detalle 
  : [];

preguntas.forEach(function(preg, idx) {
  // Buscamos el detalle correspondiente a esta pregunta
  const itemDetalle = detalleRespuestas[idx] || {};
  
  // Limpieza de texto y manejo de enunciados vacíos
  const textoPreg = fixPDF(preg.enunciado || preg.texto || ("Pregunta " + (idx + 1)));
  const lineasPreg = docPDF.splitTextToSize((idx + 1) + ". " + textoPreg, anchoMax);

  // Verificación de espacio en la página
  y = checkPage(y, (lineasPreg.length * 5) + 14);
  
  docPDF.setFont("helvetica", "bold").setFontSize(9);
  docPDF.text(lineasPreg, margenIzq, y);
  y += (lineasPreg.length * 5) + 2;

  // Extraer respuesta del estudiante de forma segura
  const respAlu = itemDetalle.respuesta_estudiante || "Sin respuesta";
  
  // Comparación lógica: verificamos si el resultado dice "correcta"
  const esCorrecta = typeof itemDetalle.resultado === "string" && 
                     itemDetalle.resultado.toLowerCase().trim() === "correcta";

  // Identificar la respuesta correcta para mostrarla en caso de error
  let respCorrecta = "N/P";
  if (Array.isArray(preg.opciones)) {
    const opFiltro = preg.opciones.find(function(o) { return o.correcta === true; });
    if (opFiltro && opFiltro.texto) { 
      respCorrecta = opFiltro.texto; 
    }
  } else if (preg.respuestaCorrecta !== undefined && preg.respuestaCorrecta !== null) {
    respCorrecta = String(preg.respuestaCorrecta);
  }

  docPDF.setFont("helvetica", "normal");
  docPDF.setFontSize(9);
  docPDF.text("Respuesta dada: " + fixPDF(respAlu), margenIzq + 5, y);

  // Colorear el resultado según sea correcto o incorrecto
  if (esCorrecta) {
    docPDF.setTextColor(46, 125, 50); // Verde para correctas
    docPDF.text("[CORRECTO]", 165, y, { align: "right" });
  } else {
    docPDF.setTextColor(198, 40, 40); // Rojo para incorrectas
    const textoError = "[INCORRECTO] - Solución: " + fixPDF(respCorrecta);
    docPDF.text(textoError, 190, y, { align: "right" });
  }

  // Resetear color a negro para la siguiente pregunta
  docPDF.setTextColor(0, 0, 0);
  y += 8;
});

  // --- RESUMEN FINAL ---
  y = checkPage(y, 45);
  docPDF.setLineWidth(0.5).line(margenIzq, y, margenDer, y); y += 10;
  docPDF.setFontSize(12).setFont("helvetica", "bold");
  docPDF.text(`CALIFICACIÓN FINAL: ${datosResultado.nota} / 20 pts.`, margenIzq, y); y += 7;
  docPDF.text(`ESTADO: ${datosResultado.nota >= 9.5 ? "APROBADO" : "REPROBADO"}`, margenIzq, y); y += 15;

  // --- BLOQUE DE FIRMA OFICIAL ---
  if (y > 250) { docPDF.addPage(); y = 30; }
  docPDF.setLineWidth(0.4).line(70, y, 140, y); y += 5;
  docPDF.setFontSize(10).text("JOSÉ AGUSTÍN FERNÁNDEZ", 105, y, { align: "center" });
  y += 5;
  docPDF.setFontSize(9).setFont("helvetica", "normal");
  docPDF.text("C.I: 28.123.219", 105, y, { align: "center" });
  y += 5;
  docPDF.text("PROFESOR DEL ÁREA DE MATEMÁTICAS", 105, y, { align: "center" });

  docPDF.save(`Acta_${fixPDF(datosResultado.nombre).replace(/ /g, "_")}.pdf`);
});
</script>
</body>
</html>
