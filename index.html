<style>

/* mejora para apk */
html, body{
height:100%;
overflow-x:hidden;
}

/* animación suave del contenedor */
.contenedor-bienvenida{
animation: aparecer 0.8s ease;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

</a>
