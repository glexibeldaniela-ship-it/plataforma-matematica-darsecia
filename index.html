<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plataforma Matemática - Prof. José Fernández</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/estilo.css">
    <style>
        .contenedor-bienvenida { animation: aparecer 0.8s ease; text-align: center; padding: 20px; }
        @keyframes aparecer { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .mensaje-profesor { font-style: italic; color: #01579b; background: rgba(255,255,255,0.5); padding: 15px; border-radius: 20px; margin: 20px 0; border-left: 5px solid #00838f; backdrop-filter: blur(5px); }
        .btn-primario { display: block; width: 100%; padding: 12px; margin: 8px 0; background: #00838f; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; text-decoration: none; }
    </style>
</head>
<body class="pantalla-inicio">
    <div class="contenedor-bienvenida">
        <div style="font-size: 3rem; margin-bottom: 10px;">📏✏️</div>
        <h1>Plataforma Matemática</h1>
        <div class="mensaje-profesor">
            <p style="font-weight: 700; margin-bottom: 8px;">🗣️ Prof. José Fernández:</p>
            <p>"El buen maestro no solo enseña números, sino que guía corazones.<br>
            <strong>Proverbios 22:6</strong><br>¡Adelante!"</p>
        </div>
        <div class="botones-inicio">
            <a href="html/login.html" class="btn-primario">Iniciar Sesión</a>
            <a href="html/registro.html" class="btn-primario">Registrarse</a>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('service-worker.js'); });
        }
    </script>
</body>
</html>
