<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Editar Evaluación - MateEduPro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="estilos.css">
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; padding: 20px; }
  .form-card { background: white; max-width: 700px; margin: auto; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
  h2 { color: #00796b; border-bottom: 2px solid #00bcd4; padding-bottom: 10px; }
  .campo { margin-bottom: 15px; }
  label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
  input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
  .btn-guardar { background: #00796b; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 20px; }
  .btn-guardar:hover { background: #004d40; }
  .regresar { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #00796b; font-weight: bold; }
</style>
</head>
<body>

<div class="form-card">
  <a href="panel-profesor.html" class="regresar">⬅ Volver al Panel</a>
  <h2>✏️ Editar Evaluación</h2>
  
  <div id="cargando">Cargando datos del examen...</div>

  <form id="formEditar" style="display:none;">
    <div class="campo">
      <label>Título del Examen:</label>
      <input type="text" id="titulo" required>
    </div>

    <div style="display:flex; gap:10px;">
      <div class="campo" style="flex:1;">
        <label>Año:</label>
        <select id="anio">
          <option value="1">1ero</option>
          <option value="2">2do</option>
          <option value="3">3ero</option>
        </select>
      </div>
      <div class="campo" style="flex:1;">
        <label>Sección:</label>
        <input type="text" id="seccion" required>
      </div>
    </div>

    <div class="campo">
      <label>Duración (minutos):</label>
      <input type="number" id="duracion" required>
    </div>

    <div class="campo">
      <label>Descripción / Instrucciones:</label>
      <textarea id="descripcion" rows="3"></textarea>
    </div>

    <p style="font-size: 0.8rem; color: #666; background: #fff3e0; padding: 10px; border-radius: 5px;">
      Nota: Por ahora, esta pantalla edita los datos generales. Para cambiar las preguntas, te recomiendo usar la opción de "Nuevo" para evitar errores de sincronización con notas ya existentes.
    </p>

    <button type="submit" class="btn-guardar">💾 Guardar Cambios</button>
  </form>
</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const idExamen = params.get("id");

const form = document.getElementById("formEditar");
const cargando = document.getElementById("cargando");

// Cargar datos actuales
if (idExamen) {
  const docRef = doc(db, "examenes", idExamen);
  const docSnap = await getDoc(docRef);

  if (docSnap.exists()) {
    const data = docSnap.data();
    document.getElementById("titulo").value = data.titulo;
    document.getElementById("anio").value = data.anio;
    document.getElementById("seccion").value = data.seccion;
    document.getElementById("duracion").value = data.duracion;
    document.getElementById("descripcion").value = data.descripcion || "";
    
    cargando.style.display = "none";
    form.style.display = "block";
  } else {
    cargando.innerText = "Error: El examen no existe.";
  }
}

// Guardar cambios
form.onsubmit = async (e) => {
  e.preventDefault();
  const docRef = doc(db, "examenes", idExamen);
  
  try {
    await updateDoc(docRef, {
      titulo: document.getElementById("titulo").value,
      anio: document.getElementById("anio").value,
      seccion: document.getElementById("seccion").value.toUpperCase(),
      duracion: parseInt(document.getElementById("duracion").value),
      descripcion: document.getElementById("descripcion").value
    });
    alert("¡Examen actualizado con éxito!");
    window.location.href = "panel-profesor.html";
  } catch (error) {
    console.error(error);
    alert("Hubo un error al guardar.");
  }
};
</script>
</body>
</html>
