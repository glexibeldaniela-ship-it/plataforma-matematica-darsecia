/* --- BUSCA ESTA PARTE EN TU PANEL DE CONTROL Y REEMPLÁZALA --- */

// 1. Agregué el botón de descarga en el HTML del panel de Estudiantes
// Busca el <h3> de "Lista de Inscritos" y pon esto debajo:

<div class="tab-panel" id="tab-estudiantes">
    <h3 style="color:#00796b">Lista de Inscritos</h3>
    <div class="filtros-box">
      <select id="fAnio" onchange="cargarEstudiantes()"><option value="todos">Todos los Años</option><option value="1">1ero</option><option value="2">2do</option><option value="3">3ero</option></select>
      <select id="fSec" onchange="cargarEstudiantes()"><option value="todas">Todas las Secciones</option><option value="A">A</option><option value="B">B</option><option value="C">C</option></select>
    </div>
    
    <button onclick="descargarListaEstudiantes()" style="background:#00796b; color:white; border:none; padding:10px; border-radius:8px; width:100%; margin-bottom:15px; font-weight:bold; cursor:pointer;">
      📥 Descargar Lista de Asistencia (PDF)
    </button>

    <div class="tabla-scroll">
      <table id="tablaEstudiantes" style="width:100%;">
        <thead style="background:#00bcd4; color:white;">
          <tr><th style="padding:10px">Nombre Completo</th><th style="padding:10px">Cédula</th><th style="padding:10px">Año/Sec</th><th style="padding:10px">Acción</th></tr>
        </thead>
        <tbody id="bodyEstudiantes"></tbody>
      </table>
    </div>
</div>

/* --- 2. AGREGA ESTA FUNCIÓN AL FINAL DE TU <script> --- */

window.descargarListaEstudiantes = async () => {
    const { jsPDF } = window.jspdf;
    const docPDF = new jsPDF();
    
    const anioFiltro = document.getElementById("fAnio").value;
    const secFiltro = document.getElementById("fSec").value;
    
    // Encabezado institucional (Igual a tus actas)
    docPDF.setFont("times", "bold"); docPDF.setFontSize(10);
    docPDF.text("REPÚBLICA BOLIVARIANA DE VENEZUELA", 105, 15, { align: "center" });
    docPDF.text("U.E.E. CECILIA NÚÑEZ SUCRE", 105, 20, { align: "center" });
    docPDF.setFontSize(12);
    docPDF.text(`LISTA DE ESTUDIANTES - ${anioFiltro === 'todos' ? 'TODOS' : anioFiltro + '° AÑO'} ${secFiltro === 'todas' ? '' : 'SECCIÓN ' + secFiltro}`, 105, 30, { align: "center" });

    // Preparar datos de la tabla
    const filas = [];
    const tableBody = document.getElementById("bodyEstudiantes");
    const rows = tableBody.querySelectorAll("tr");

    rows.forEach(row => {
        const cols = row.querySelectorAll("td");
        if(cols.length > 0) {
            // Limpiamos el texto del nombre (quitando el CI pequeño si existe)
            const nombre = cols[0].querySelector("b").innerText;
            const cedula = cols[0].querySelector("small").innerText.replace("CI: ", "");
            const gradoSec = cols[1].innerText;
            filas.push([nombre, cedula, gradoSec, "________________"]); // Espacio para firma
        }
    });

    // Generar tabla en el PDF
    docPDF.autoTable({
        head: [['Nombre Completo', 'Cédula', 'Año/Sec', 'Firma / Observación']],
        body: filas,
        startY: 40,
        theme: 'grid',
        headStyles: { fillColor: [0, 121, 107] },
        styles: { fontSize: 9 }
    });

    docPDF.save(`Lista_Estudiantes_${anioFiltro}_${secFiltro}.pdf`);
};
