<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Presentar Examen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>Presentar Examen</h2>

<div id="infoExamen"></div>
<h3 id="temporizador" style="color:red;"></h3>
<hr>
<div id="preguntas"></div>
<br>
<button id="btnEnviar">Enviar Examen</button>

<script type="module">

import { auth, db } from "./firebase.js";
import { doc, getDoc, collection, getDocs, addDoc } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const examenId = params.get("id");

const infoDiv = document.getElementById("infoExamen");
const preguntasDiv = document.getElementById("preguntas");
const btnEnviar = document.getElementById("btnEnviar");
const temporizadorDiv = document.getElementById("temporizador");

let preguntasData = [];
let usuarioActual = null;
let tiempoRestante = 0;
let intervaloTimer = null;
let examenEnviado = false;
let examenIniciado = false;

/* 🔒 BLOQUEAR RECARGA */
window.addEventListener("beforeunload", function (e) {
  if (!examenEnviado && examenIniciado) {
    e.preventDefault();
    e.returnValue = "";
  }
});

/* 🔒 DETECTAR CIERRE / RECARGA REAL */
window.addEventListener("unload", function () {
  if (!examenEnviado && examenIniciado) {
    enviarExamen(true);
  }
});

/* 🔒 SI CAMBIA DE PESTAÑA */
document.addEventListener("visibilitychange", () => {
  if (document.hidden && !examenEnviado && examenIniciado) {
    alert("Saliste del examen. Se enviará automáticamente con nota 0.");
    enviarExamen(true);
  }
});

/* Verificar si ya presentó */
async function yaPresentoExamen(uid) {

  const resultadosSnap = await getDocs(
    collection(db, "examenes", examenId, "resultados")
  );

  let yaPresento = false;

  resultadosSnap.forEach(docu => {
    if (docu.data().estudiante_id === uid) {
      yaPresento = true;
    }
  });

  return yaPresento;
}

/* ⏳ Temporizador */
function iniciarTemporizador(minutos) {

  examenIniciado = true;
  tiempoRestante = minutos * 60;

  intervaloTimer = setInterval(() => {

    let min = Math.floor(tiempoRestante / 60);
    let seg = tiempoRestante % 60;

    temporizadorDiv.innerText = 
      `Tiempo restante: ${min}:${seg < 10 ? "0"+seg : seg}`;

    tiempoRestante--;

    if (tiempoRestante < 0) {
      clearInterval(intervaloTimer);
      alert("Tiempo agotado. Nota 0.");
      enviarExamen(true);
    }

  }, 1000);
}

/* Cargar examen */
async function cargarExamen() {

  const examenSnap = await getDoc(doc(db, "examenes", examenId));

  if (!examenSnap.exists()) {
    infoDiv.innerHTML = "<p>Examen no existe.</p>";
    return;
  }

  const examen = examenSnap.data();

  infoDiv.innerHTML = `
    <h3>${examen.titulo}</h3>
    <p>Año: ${examen.anio}</p>
    <p>Sección: ${examen.seccion}</p>
    <p>Lapso: ${examen.lapso || "No definido"}</p>
    <p>Duración: ${examen.duracion} minutos</p>
  `;

  iniciarTemporizador(examen.duracion);

  const preguntasSnap = await getDocs(
    collection(db, "examenes", examenId, "preguntas")
  );

  let numero = 1;

  preguntasSnap.forEach(docu => {

    const pregunta = docu.data();
    pregunta.id = docu.id;
    preguntasData.push(pregunta);

    const div = document.createElement("div");
    div.style.border = "1px solid gray";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `<h4>${numero}. ${pregunta.enunciado}</h4>`;

    if (pregunta.tipo === "opcion_multiple") {
      pregunta.opciones.forEach(op => {
        div.innerHTML += `
          <label>
            <input type="radio" name="preg_${pregunta.id}" value="${op.texto}">
            ${op.texto}
          </label><br>
        `;
      });
    }

    if (pregunta.tipo === "numerica") {
      div.innerHTML += `<input type="number" name="preg_${pregunta.id}">`;
    }

    if (pregunta.tipo === "completar") {
      div.innerHTML += `<input type="text" name="preg_${pregunta.id}">`;
    }

    if (pregunta.tipo === "verdadero_falso") {
      div.innerHTML += `
        <label><input type="radio" name="preg_${pregunta.id}" value="verdadero"> Verdadero</label><br>
        <label><input type="radio" name="preg_${pregunta.id}" value="falso"> Falso</label>
      `;
    }

    preguntasDiv.appendChild(div);
    numero++;
  });

}

/* Enviar examen */
async function enviarExamen(forzado = false) {

  if (examenEnviado) return;
  examenEnviado = true;

  clearInterval(intervaloTimer);
  btnEnviar.disabled = true;

  let correctas = 0;

  if (!forzado) {

    preguntasData.forEach(pregunta => {

      const input = document.querySelector(`[name="preg_${pregunta.id}"]:checked`) ||
                    document.querySelector(`[name="preg_${pregunta.id}"]`);

      if (!input) return;

      const respuestaUsuario = input.value;

      if (pregunta.tipo === "opcion_multiple") {
        const correcta = pregunta.opciones.find(op => op.correcta);
        if (correcta && respuestaUsuario === correcta.texto) correctas++;
      }

      if (pregunta.tipo === "numerica") {
        if (parseFloat(respuestaUsuario) === pregunta.respuestaCorrecta) correctas++;
      }

      if (pregunta.tipo === "completar") {
        if (respuestaUsuario.trim().toLowerCase() === 
            pregunta.respuestaCorrecta.trim().toLowerCase()) correctas++;
      }

      if (pregunta.tipo === "verdadero_falso") {
        if (respuestaUsuario === pregunta.respuestaCorrecta) correctas++;
      }

    });

  }

  const total = preguntasData.length;
  const nota = forzado ? 0 : (correctas / total) * 20;

  const usuarioSnap = await getDoc(doc(db, "usuarios", usuarioActual.uid));
  const usuarioData = usuarioSnap.data();

  const examenSnap = await getDoc(doc(db, "examenes", examenId));
  const examenData = examenSnap.data();

  await addDoc(
    collection(db, "examenes", examenId, "resultados"),
    {
      estudiante_id: usuarioActual.uid,
      nombre: usuarioData.nombre || "Sin nombre",
      grado: examenData.anio,
      seccion: examenData.seccion,
      lapso: examenData.lapso || "No definido",
      tiempo: "Automático",
      nota: parseFloat(nota.toFixed(2)),
      estado: nota >= 10 ? "Aprobado" : "Reprobado",
      fecha: new Date()
    }
  );

  alert("Examen finalizado. Nota: " + nota.toFixed(2));
  window.location.href = "panel-estudiante.html";
}

btnEnviar.addEventListener("click", () => enviarExamen(false));

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  usuarioActual = user;

  const yaPresento = await yaPresentoExamen(user.uid);

  if (yaPresento) {
    infoDiv.innerHTML = `
      <h2 style="color:red;">⚠ Ya presentaste este examen</h2>
      <p>No puedes repetirlo.</p>
    `;
    btnEnviar.style.display = "none";
    return;
  }

  await cargarExamen();

});

</script>

</body>
</html>
