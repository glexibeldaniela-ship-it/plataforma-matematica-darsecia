<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Registro Estudiante</title>

<link rel="stylesheet" href="estilos.css">

<style>

/* optimización para APK */
html, body{
height:100%;
overflow-x:hidden;
}

/* animación suave */
.contenedor-registro{
animation: aparecer 0.7s ease;
}

@keyframes aparecer{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* mejorar espacio entre campos */
.contenedor-registro input,
.contenedor-registro select{
margin-bottom:10px;
}

</style>

</head>

<body class="pantalla-registro">

<div class="contenedor-registro">

<h2>Registro de Estudiante</h2>

<div class="emoji-mate">📏✏️</div>

<form id="formRegistro">

<input type="text" id="cedula" placeholder="Cédula" required>

<input type="text" id="nombres" placeholder="Nombres completos" required>

<input type="text" id="apellidos" placeholder="Apellidos completos" required>

<input type="date" id="fechaNacimiento" required>

<input type="email" id="email" placeholder="Correo" required>

<input type="password" id="password" placeholder="Contraseña" required>

<select id="anio" required>
<option value="">Seleccione Año</option>
<option value="1">1° Año</option>
<option value="2">2° Año</option>
<option value="3">3° Año</option>
</select>

<select id="seccion" required>
<option value="">Seleccione Sección</option>
<option value="A">A</option>
<option value="B">B</option>
</select>

<select id="lapso" required>
<option value="">Seleccione Lapso</option>
<option value="1">Lapso 1</option>
<option value="2">Lapso 2</option>
<option value="3">Lapso 3</option>
</select>

<button type="submit" class="btn-turquesa">Crear Cuenta</button>

</form>

</div>

<script type="module" src="./registro.js"></script>

</body>
</html>
