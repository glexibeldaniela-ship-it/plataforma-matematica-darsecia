<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Registro Estudiante</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="estilos.css">
</head>

<body class="pantalla-registro"> <!-- Fondo de registro -->

  <!-- Imagen decorativa en la esquina superior derecha -->
  <img src="https://i.postimg.cc/Z5QDHdnZ/1772851546228.png" class="decoracion-registro">

  <div class="contenedor-registro">
    <h2>Registro de Estudiante</h2>

    <!-- Emoji divertido de matemáticas -->
    <div class="emoji-mate">📏✏️</div>

    <form id="formRegistro">
      <input type="text" id="cedula" placeholder="Cédula" required><br>
      <input type="text" id="nombres" placeholder="Nombres completos" required><br>
      <input type="text" id="apellidos" placeholder="Apellidos completos" required><br>
      <input type="date" id="fechaNacimiento" placeholder="Fecha de Nacimiento" required><br>
      <input type="email" id="email" placeholder="Correo" required><br>
      <input type="password" id="password" placeholder="Contraseña" required><br>

      <select id="anio" required>
        <option value="">Seleccione Año</option>
        <option value="1">1° Año</option>
        <option value="2">2° Año</option>
        <option value="3">3° Año</option>
      </select><br><br>

      <select id="seccion" required>
        <option value="">Seleccione Sección</option>
        <option value="A">A</option>
        <option value="B">B</option>
      </select><br><br>

      <select id="lapso" required>
        <option value="">Seleccione Lapso</option>
        <option value="1">Lapso 1</option>
        <option value="2">Lapso 2</option>
        <option value="3">Lapso 3</option>
      </select><br><br>

      <button type="submit" class="btn-crear">Crear Cuenta</button>
    </form>
  </div>

  <!-- Scripts Firebase -->
  <script type="module" src="./registro.js"></script>

</body>
</html>
