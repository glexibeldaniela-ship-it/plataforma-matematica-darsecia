<h3 class="bienvenida" id="bienvenidaAdmin">Bienvenido Administrador José</h3>

<!-- Crear Profesor -->
<h3>Crear Profesor</h3>
<div class="formulario-creacion">
  <input type="email" id="emailProfesor" placeholder="Correo del profesor">
  <input type="password" id="passwordProfesor" placeholder="Contraseña">
  <button class="btn-crear" onclick="crearProfesor()">Crear Profesor</button>
</div>
<hr>

<!-- Crear Estudiante -->
<h3>Crear Estudiante</h3>
<div class="formulario-creacion">
  <input type="text" id="nombresEst" placeholder="Nombres">
  <input type="text" id="apellidosEst" placeholder="Apellidos">
  <input type="text" id="cedulaEst" placeholder="Cédula">
  <input type="date" id="fechaNacimientoEst" placeholder="Fecha de Nacimiento">
  <input type="text" id="anioEst" placeholder="Año">
  <input type="text" id="seccionEst" placeholder="Sección">
  <input type="email" id="emailEst" placeholder="Correo">
  <input type="password" id="passwordEst" placeholder="Contraseña">
  <button class="btn-crear" onclick="crearEstudiante()">Crear Estudiante</button>
</div>
<hr>

<!-- Administrar Estudiantes -->
<h3>Administrar Estudiantes</h3>
<div id="listaEstudiantes" class="lista-estudiantes"></div>

<div id="estadisticasEstudiantes" class="resumen-estadisticas">
  <strong>Total Estudiantes:</strong> <span id="totalEst"></span> |
  <strong>Por Sección:</strong> <span id="porSeccion"></span> |
  <strong>En Línea:</strong> <span id="estudiantesOnline"></span>
</div>
<hr>

<button onclick="cerrarSesion()" class="btn-cerrar">Cerrar Sesión</button>

<script type="module">
import { db, auth } from "./firebase.js";
import { 
  collection, getDocs, deleteDoc, doc, onSnapshot, setDoc 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { 
  sendPasswordResetEmail, createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getAuth, initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

// ==========================
// Estudiantes
// ==========================
const totalEst = document.getElementById("totalEst");
const porSeccion = document.getElementById("porSeccion");
const estudiantesOnline = document.getElementById("estudiantesOnline");

async function cargarEstudiantes() {
  const listaDiv = document.getElementById("listaEstudiantes");
  listaDiv.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "usuarios"));
  let total = 0;
  const secciones = {};
  let online = [];

  querySnapshot.forEach((docu) => {
    const data = docu.data();
    if (data.rol === "estudiante") {
      total++;
      secciones[data.seccion] = (secciones[data.seccion] || 0) + 1;
      if (data.estado === "online") online.push(`${data.nombres} ${data.apellidos}`);

      const div = document.createElement("div");
      div.classList.add("estudiante-item");
      div.innerHTML = `
        <div class="estudiante-info">
          <strong>${data.nombres} ${data.apellidos}</strong><br>
          Cédula: ${data.cedula} | Fecha de Nacimiento: ${data.fechaNacimiento}<br>
          Sección: ${data.seccion} | Año: ${data.anio}
        </div>
        <div class="estudiante-acciones">
          <button class="btn-reset" onclick="resetearPassword('${data.email}')">Resetear contraseña</button>
          <button class="btn-borrar" onclick="borrarEstudiante('${docu.id}', '${data.cedula}')">Borrar</button>
        </div>
      `;
      listaDiv.appendChild(div);
    }
  });

  totalEst.textContent = total;
  porSeccion.textContent = JSON.stringify(secciones);
  estudiantesOnline.textContent = online.length > 0 ? online.join(", ") : "Ninguno";
}

window.resetearPassword = async function(email) {
  try {
    await sendPasswordResetEmail(auth, email);
    alert("Correo de recuperación enviado a " + email);
  } catch (error) {
    alert("Error al enviar correo: " + error.message);
  }
}

window.borrarEstudiante = async function(uid, cedula) {
  if (!confirm("¿Seguro quieres borrar este estudiante?")) return;
  try {
    await deleteDoc(doc(db, "usuarios", uid));
    await deleteDoc(doc(db, "cedulas", cedula));
    alert("Estudiante borrado correctamente");
    cargarEstudiantes();
  } catch (error) { alert("Error al borrar estudiante: " + error.message); }
}

onSnapshot(collection(db, "usuarios"), () => {
  cargarEstudiantes();
});

// ==========================
// Crear Profesor
// ==========================
window.crearProfesor = async function() {
  const email = document.getElementById("emailProfesor").value;
  const password = document.getElementById("passwordProfesor").value;
  if(!email || !password){ alert("Complete todos los campos"); return; }

  try {
    const firebaseConfig = auth.app.options;
    const tempApp = initializeApp(firebaseConfig, "Secondary");
    const tempAuth = getAuth(tempApp);
    const userCredential = await createUserWithEmailAndPassword(tempAuth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db,"usuarios", user.uid), { email, rol:"profesor" });
    alert("Profesor creado correctamente");
    await tempAuth.signOut();
  } catch(error){ alert("Error: " + error.message); }
}

// ==========================
// Crear Estudiante
// ==========================
window.crearEstudiante = async function() {
  const nombres = document.getElementById("nombresEst").value.trim();
  const apellidos = document.getElementById("apellidosEst").value.trim();
  const cedula = document.getElementById("cedulaEst").value.trim();
  const fechaNacimiento = document.getElementById("fechaNacimientoEst").value;
  const anio = document.getElementById("anioEst").value.trim();
  const seccion = document.getElementById("seccionEst").value.trim();
  const email = document.getElementById("emailEst").value.trim();
  const password = document.getElementById("passwordEst").value.trim();

  if(!nombres || !apellidos || !cedula || !fechaNacimiento || !anio || !seccion || !email || !password) {
    alert("Complete todos los campos");
    return;
  }

  try {
    const cedulaRef = doc(db,"cedulas", cedula);
    const cedulaSnap = await getDocs(cedulaRef);
    if(cedulaSnap.exists()){ alert("Cédula ya registrada"); return; }

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(doc(db,"usuarios", user.uid), {
      nombres, apellidos, cedula, fechaNacimiento, anio, seccion,
      email, rol:"estudiante", estado:"sin_presentar", creado_en:new Date()
    });

    await setDoc(doc(db,"cedulas", cedula), { uid:user.uid });
    alert("Estudiante creado correctamente");
    cargarEstudiantes();
  } catch(error){ alert("Error: " + error.message); }
}

// ==========================
// Cerrar sesión
// ==========================
window.cerrarSesion = function(){
  auth.signOut().then(()=>{ window.location.href="login.html"; });
}

// ==========================
// Ejecutar al cargar
// ==========================
cargarEstudiantes();
</script>
