<h2>Panel Administrador</h2>

<div id="contenidoAdmin" style="display:none;">

<h3>Crear Profesor</h3>

<input type="email" id="emailProfesor" placeholder="Correo del profesor"><br><br>
<input type="password" id="passwordProfesor" placeholder="Contraseña"><br><br>

<button onclick="crearProfesor()">Crear Profesor</button>

<hr>

<h3>Crear Estudiante</h3>

<input type="text" id="cedulaEstudiante" placeholder="Cédula"><br><br>
<input type="text" id="nombreEstudiante" placeholder="Nombre completo"><br><br>
<input type="date" id="fechaNacimiento"><br><br>
<input type="email" id="emailEstudiante" placeholder="Correo"><br><br>
<input type="password" id="passwordEstudiante" placeholder="Contraseña"><br><br>

<button onclick="crearEstudiante()">Crear Estudiante</button>

<br><br>
<button onclick="cerrarSesion()">Cerrar Sesión</button>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import { 
signOut,
onAuthStateChanged,
createUserWithEmailAndPassword,
getAuth
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
doc,
setDoc,
getDocs,
collection,
getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

const contenidoAdmin = document.getElementById("contenidoAdmin");

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

const userRef=doc(db,"usuarios",user.uid);
const userSnap=await getDoc(userRef);

if(!userSnap.exists() || userSnap.data().rol!=="admin"){
document.body.innerHTML=`
<h2 style="color:red;">Acceso Denegado</h2>
<p>No tienes permisos para entrar aquí</p>
`;
return;
}

contenidoAdmin.style.display="block";

});

window.cerrarSesion=function(){
signOut(auth).then(()=>{
window.location.href="login.html";
});
};

window.crearProfesor=async function(){

const email=document.getElementById("emailProfesor").value;
const password=document.getElementById("passwordProfesor").value;

if(!email || !password){
alert("Complete todos los campos");
return;
}

const querySnapshot=await getDocs(collection(db,"usuarios"));

let existeProfesor=false;

querySnapshot.forEach((docu)=>{
if(docu.data().rol==="profesor"){
existeProfesor=true;
}
});

if(existeProfesor){
alert("Ya existe un profesor activo");
return;
}

try{

const firebaseConfig=auth.app.options;
const tempApp=initializeApp(firebaseConfig,"Secondary");
const tempAuth=getAuth(tempApp);

const userCredential=await createUserWithEmailAndPassword(tempAuth,email,password);
const user=userCredential.user;

await setDoc(doc(db,"usuarios",user.uid),{
email:email,
rol:"profesor"
});

alert("Profesor creado correctamente");

await tempAuth.signOut();

}catch(error){
alert("Error: "+error.message);
}

};

window.crearEstudiante=async function(){

const cedula=document.getElementById("cedulaEstudiante").value;
const nombre=document.getElementById("nombreEstudiante").value;
const fecha=document.getElementById("fechaNacimiento").value;
const email=document.getElementById("emailEstudiante").value;
const password=document.getElementById("passwordEstudiante").value;

if(!cedula || !nombre || !fecha || !email || !password){
alert("Complete todos los campos");
return;
}

try{

const firebaseConfig=auth.app.options;
const tempApp=initializeApp(firebaseConfig,"Secondary2");
const tempAuth=getAuth(tempApp);

const userCredential=await createUserWithEmailAndPassword(tempAuth,email,password);
const user=userCredential.user;

await setDoc(doc(db,"usuarios",user.uid),{
cedula:cedula,
nombre:nombre,
fecha_nacimiento:fecha,
email:email,
rol:"estudiante"
});

alert("Estudiante creado correctamente");

await tempAuth.signOut();

}catch(error){
alert("Error: "+error.message);
}

};

</script>
